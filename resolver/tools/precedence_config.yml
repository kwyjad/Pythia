# Precedence policy — 3 active connectors + EM-DAT (historical read-only)
metric_preference: [in_need, affected]   # PIN first, else PA

# Tier entries must match the lowercased `publisher` column that connectors
# write (run_pipeline uses publisher as the precedence source id). "ifrc" is
# the value the IFRC Montandon connector actually writes; the legacy
# "ifrc_montandon" slug is kept for the CLI path and old data.
tiers:
  - ["ifrc_montandon", "ifrc", "acled"]
  - ["idmc"]
  - ["emdat"]                            # historical read-only (no connector)

# Within-tier tiebreak rules for resolve_facts_frame (the run_pipeline path).
# Without this key the engine used to fall back to alphabetical source order,
# ignoring recency and allowing NULL-value rows to win.
tiebreak:
  - as_of_desc
  - value_nonnull
  - source_alpha

defaults:
  require_nonnegative: true
  prefer_full_row_coverage: true

source_precedence:
  - ifrc_or_gov_sitrep
  - acled
  - idmc
  - emdat_historical

source_mapping:
  ifrc_or_gov_sitrep:
    source_type: ["sitrep", "gov"]
    publisher: ["IFRC"]
  acled:
    source_type: ["other"]
    publisher: ["ACLED"]
  idmc:
    source_type: ["agency"]
    publisher: ["IDMC"]
  emdat_historical:
    source_type: ["agency"]
    publisher: ["EM-DAT", "CRED/EM-DAT"]

conflict_rule:
  threshold_pct: 20
  tie_breaker: latest_as_of

cutoff:
  timezone: "Europe/Istanbul"
  lag_days_allowed: 7

lags:
  acled: 2d
  ifrc_montandon: 2d
  idmc: 3d
