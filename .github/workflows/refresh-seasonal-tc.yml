---
name: Refresh TC Seasonal Forecasts

concurrency:
  group: pythia-seasonal-tc-refresh
  cancel-in-progress: false

"on":
  workflow_dispatch:
    inputs:
      year:
        description: "Forecast year (auto-detects if empty)"
        required: false
        default: ""
  schedule:
    # TC seasonal forecasts are published sporadically throughout the year.
    # Running on the 28th of each month ensures any new forecasts are
    # captured before the 1st-of-month pipeline run.
    - cron: "0 0 28 * *"

permissions:
  contents: read
  actions: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  refresh:
    name: Fetch & cache TC seasonal forecasts (TSR, NOAA CPC, BoM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r python_library_requirements.txt

      - name: Run TC seasonal scraper
        run: |
          YEAR="${{ inputs.year }}"
          if [ -z "$YEAR" ]; then
            YEAR=$(date +%Y)
          fi
          python -m horizon_scanner.seasonal_tc.seasonal_tc_runner \
            --year "$YEAR" \
            --prompt-context

      - name: Upload cached forecasts
        uses: actions/upload-artifact@v4
        with:
          name: seasonal-tc-forecasts-${{ github.run_id }}
          path: horizon_scanner/seasonal_tc/output/seasonal_tc_forecasts.json
          retention-days: 60
