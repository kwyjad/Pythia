---
name: Pythia — Compute Resolutions

on:
  workflow_run:
    workflows: ["Resolver Update"]
    types: [completed]

  # Optional manual trigger
  workflow_dispatch: {}

concurrency:
  group: pythia-resolver-db
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  compute-resolutions:
    # Run on manual dispatch or successful upstream completion only — without
    # this guard the job also fired on FAILED Resolver Update runs.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      RESOLVER_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install -r python_library_requirements.txt
          pip install duckdb

      # Path A: triggering Resolver Update run; Path B (manual dispatch or
      # expired artifact): canonical discovery — previously manual dispatch
      # always failed here because workflow_run.id is empty on dispatch.
      - name: Download canonical resolver DB
        uses: ./.github/actions/download-canonical-db
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Compute resolutions from Resolver
        run: |
          echo "=== Computing Pythia resolutions from Resolver ==="
          python -m pythia.tools.compute_resolutions --db-url "${RESOLVER_DB_URL}"
          echo "=== Resolution computation completed ==="

      - name: Upload canonical resolver DB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db
          path: data/resolver.duckdb
