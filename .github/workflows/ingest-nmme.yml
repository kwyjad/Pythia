---
name: Ingest NMME Seasonal Forecasts

concurrency:
  group: pythia-resolver-db
  cancel-in-progress: false

"on":
  workflow_dispatch:
    inputs:
      year_month:
        description: "Issue month as YYYYMM (auto-detects if empty)"
        required: false
        default: ""
      dry_run:
        description: "Fetch and process but do not write to DuckDB"
        required: false
        default: "false"
        type: boolean
  # schedule disabled — NMME ingestion now runs as part of ingest-structured-data.yml
  # schedule:
  #   - cron: "0 6 10 * *"

permissions:
  contents: read
  actions: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  ingest:
    name: Fetch & ingest NMME seasonal forecasts
    runs-on: ubuntu-latest
    env:
      PYTHIA_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      RESOLVER_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      SIGNATURE_REQUIRED_TABLES: questions,hs_triage,question_research,forecasts_ensemble,llm_calls,facts_resolved,facts_deltas,acled_monthly_fatalities
      SIGNATURE_OPTIONAL_TABLES: scenarios
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r python_library_requirements.txt

      - name: Install gh CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate gh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      # Canonical discovery via the shared composite action (single home of
      # the candidate list). Per-candidate signature validation rejects DBs
      # missing required tables.
      - name: Download canonical resolver DB
        uses: ./.github/actions/download-canonical-db
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          validate-cmd: >-
            python -m scripts.ci.db_signature write
            --db data/resolver.duckdb
            --required "${SIGNATURE_REQUIRED_TABLES}"
            --optional "${SIGNATURE_OPTIONAL_TABLES}"
            --out data/db_signature_before.json

      - name: Run NMME ingestion
        run: |
          set -- python -m resolver.tools.ingest_nmme
          if [ -n "${{ inputs.year_month }}" ]; then
            set -- "$@" --year-month "${{ inputs.year_month }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            set -- "$@" --dry-run
          fi
          "$@"

      - name: Upload canonical resolver DB
        if: inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db
          path: data/resolver.duckdb
          retention-days: 90
