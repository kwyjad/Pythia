---
name: Refresh CrisisWatch Data

concurrency:
  group: pythia-crisiswatch-refresh
  cancel-in-progress: false

# NOTE (July 2026): crisisgroup.org's Cloudflare blocks CI-runner
# Playwright fetches, so this workflow fetches the SERVER-RENDERED page
# from the Internet Archive instead (--source wayback): trigger a Save
# Page Now capture (best-effort; authenticated when the optional
# IA_S3_ACCESS_KEY / IA_S3_SECRET_KEY secrets are set — free keys from
# https://archive.org/account/s3.php), then walk CDX snapshots newest-
# first with validation that rejects Cloudflare-challenged captures.
#
# ICG publishes the previous month's edition in the first days of each
# month; the early-month cron burst plus --only-if-newer makes repeat
# runs idempotent no-ops (green, no commit). --max-age-days turns runs
# red when the on-disk edition is more than two months stale, so silent
# rot is visible. The local Playwright path (--source live, default)
# still works for manual refreshes.
"on":
  schedule:
    - cron: "17 6 3,5,7,10 * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Write even if the parsed edition is not newer than the checked-in JSON"
        required: false
        default: false
        type: boolean

permissions:
  contents: write  # required to commit the JSON back to the repo

env:
  PYTHONUNBUFFERED: "1"

jobs:
  refresh:
    name: Fetch & parse ICG CrisisWatch via Wayback Machine
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages (no browser needed)
        run: |
          python -m pip install --upgrade pip
          pip install "requests>=2.32,<3" "beautifulsoup4>=4.12,<5" "PyYAML>=6.0,<7"

      - name: Run CrisisWatch refresh (wayback source)
        env:
          IA_S3_ACCESS_KEY: ${{ secrets.IA_S3_ACCESS_KEY }}
          IA_S3_SECRET_KEY: ${{ secrets.IA_S3_SECRET_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python -m scripts.refresh_crisiswatch \
            --source wayback \
            --only-if-newer \
            --max-age-days 60 \
            $FORCE_FLAG \
            --verbose

      - name: Upload CrisisWatch JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crisiswatch-data-${{ github.run_id }}
          path: |
            horizon_scanner/data/crisiswatch_latest.json
            horizon_scanner/data/crisiswatch_debug.html
          retention-days: 90

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f horizon_scanner/data/crisiswatch_latest.json
          git diff --cached --quiet || git commit -m "chore(crisiswatch): refresh monthly data"
          git push
