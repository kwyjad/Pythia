---
name: Resolver Update

concurrency:
  group: pythia-resolver-db
  cancel-in-progress: false

"on":
  workflow_dispatch:
    inputs:
      months_back:
        description: "Number of months to backfill"
        required: true
        default: "3"
      reset_db:
        description: "Delete existing resolver.duckdb and rebuild from scratch?"
        required: false
        default: "false"
      only_connector:
        description: >-
          Optional: run only these connectors (comma-separated).
          Core: acled_client, idmc, ifrc_go_client.
          Resolution: fewsnet_ipc (see fewsnet_months), ipc_api (see ipc_api_months), gdacs (see gdacs_months).
          Structured: conflict (views+cf+cast), acaps, reliefweb, acled_political, nmme.
          Context: enso, seasonal_tc, hdx_signals, crisiswatch.
          Leave empty to run all. Examples: "gdacs" or "gdacs, fewsnet_ipc".
        required: false
        default: ""
      log_level:
        description: "Log level (DEBUG, INFO, WARNING, ERROR)"
        required: false
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR
      empty_policy:
        description: "What to do when a connector writes 0 rows? (allow|warn|fail)"
        required: false
        default: "allow"
        type: choice
        options:
          - allow
          - warn
          - fail
      gdacs_months:
        description: "Months of GDACS data to fetch (default 3; use 135 for full backfill to 2015)"
        required: false
        default: "3"
        type: string
      fewsnet_months:
        description: "Months of FEWS NET IPC data to fetch (default 12; use 120 for full backfill to 2016)"
        required: false
        default: "12"
        type: string
      ipc_api_months:
        description: "Months of IPC API data to fetch (default 24; IPC analyses are infrequent)"
        required: false
        default: "24"
        type: string
  schedule:
    # Run at 03:00 UTC on the 15th of each month
    - cron: "0 3 15 * *"

permissions:
  contents: read
  actions: read

env:
  PYTHONUNBUFFERED: "1"
  BACKFILL_DB_PATH: data/resolver.duckdb
  SIGNATURE_REQUIRED_TABLES: questions,hs_triage,question_research,forecasts_ensemble,llm_calls,facts_resolved,facts_deltas,acled_monthly_fatalities
  SIGNATURE_OPTIONAL_TABLES: scenarios,hdx_signals,enso_state,seasonal_tc_outlooks,seasonal_tc_context_cache

jobs:
  backfill:
    name: Full pipeline backfill
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RESOLVER_DB_URL: ${{ secrets.RESOLVER_DUCKDB_URL != '' && secrets.RESOLVER_DUCKDB_URL || format('duckdb:///{0}/data/resolver.duckdb', github.workspace) }}
      PYTHIA_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      ACLED_REFRESH_TOKEN: ${{ secrets.ACLED_REFRESH_TOKEN }}
      ACLED_USERNAME: ${{ secrets.ACLED_USERNAME }}
      ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
      ACLED_ACCESS_KEY: ${{ secrets.ACLED_ACCESS_KEY }}
      IDMC_API_TOKEN: ${{ secrets.IDMC_API_TOKEN }}
      IDMC_REQ_PER_SEC: 0.3
      IDMC_MAX_CONCURRENCY: 1
      IDMC_ALLOW_HDX_FALLBACK: "1"
      IDMC_HDX_PACKAGE_ID: preliminary-internal-displacement-updates
      ONLY_CONNECTOR: ${{ inputs.only_connector }}
      RESOLVER_OUTPUT_DIR: resolver/staging
      LOG_LEVEL: ${{ inputs.log_level }}
      EMPTY_POLICY: ${{ inputs.empty_policy }}
      IDMC_HELIX_CLIENT_ID: ${{ secrets.IDMC_HELIX_CLIENT_ID }}
      IDMC_HELIX_ENV: RELEASE
      RESOLVER_EXPORT_ENABLE_FLOW: "1"
      ACAPS_USERNAME: ${{ secrets.ACAPS_USERNAME }}
      ACAPS_PASSWORD: ${{ secrets.ACAPS_PASSWORD }}
      IPC_API_KEY: ${{ secrets.IPC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      EMDAT_API_KEY: ${{ secrets.EMDAT_API_KEY }}
      FEWSNET_MONTHS: ${{ inputs.reset_db == 'true' && '120' || inputs.fewsnet_months || '12' }}
      IPC_API_MONTHS: ${{ inputs.reset_db == 'true' && '120' || inputs.ipc_api_months || '24' }}
      GDACS_MONTHS: ${{ inputs.reset_db == 'true' && '135' || inputs.gdacs_months || '3' }}
      DIAGNOSTICS_REPORT_PATH: diagnostics/ingestion/connectors_report.jsonl

    steps:
      # === SETUP ===
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel setuptools
          pip install -c constraints-ci.txt -e '.[db,ingestion]'

      - name: Compute backfill window
        id: window
        env:
          MONTHS_INPUT: ${{ inputs.months_back || '3' }}
          TIMEZONE: Europe/Istanbul
        run: |
          set -euo pipefail
          if [ "${LOG_LEVEL:-INFO}" = "DEBUG" ]; then
            set -x
          fi
          python -m scripts.ci.compute_backfill_window

      - name: Download canonical resolver DB for incremental runs
        id: canonical_download
        if: github.event_name != 'workflow_dispatch' || inputs.reset_db != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data diagnostics
          rm -f diagnostics/db_signature_before.json
          rm -rf data/pythia-resolver-db

          CANDIDATES_FILE=$(mktemp)
          gh run list \
            --workflow "Horizon Scanner Triage" \
            --branch main \
            --status success \
            --json databaseId,createdAt \
            --limit 20 | jq -r '.[] | "\(.createdAt),\(.databaseId),Horizon Scanner Triage"' >>"${CANDIDATES_FILE}" || true
          gh run list \
            --workflow "Resolver Update" \
            --branch main \
            --status success \
            --json databaseId,createdAt \
            --limit 20 | jq -r '.[] | "\(.createdAt),\(.databaseId),Resolver Update"' >>"${CANDIDATES_FILE}" || true
          gh run list \
            --workflow "Ingest Structured Data" \
            --branch main \
            --status success \
            --json databaseId,createdAt \
            --limit 20 | jq -r '.[] | "\(.createdAt),\(.databaseId),Ingest Structured Data"' >>"${CANDIDATES_FILE}" || true

          if [ ! -s "${CANDIDATES_FILE}" ]; then
            echo "ERROR: No prior successful runs found; cannot build canonical DB."
            exit 1
          fi

          sort -r "${CANDIDATES_FILE}" > "${CANDIDATES_FILE}.sorted"

          FOUND=0
          FOUND_SOURCE=""
          FOUND_RUN_ID=""
          FOUND_CREATED_AT=""

          download_artifact_with_retries() {
            local run_id="$1"
            local artifact_name="$2"
            local out_dir="$3"
            local max_attempts="${4:-6}"
            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Downloading artifact '${artifact_name}' from run ${run_id} (attempt ${attempt}/${max_attempts})"
              rm -rf "${out_dir}/pythia-resolver-db" || true
              if gh run download "$run_id" -n "$artifact_name" --dir "$out_dir"; then
                echo "Download OK."
                return 0
              fi
              rc=$?
              sleep_seconds=$(( 5 * attempt * attempt ))
              echo "Download failed (exit=${rc}). Sleeping ${sleep_seconds}s before retry..."
              sleep "${sleep_seconds}"
              attempt=$((attempt + 1))
            done
            echo "ERROR: Failed to download artifact '${artifact_name}' from run ${run_id} after ${max_attempts} attempts."
            return 1
          }

          while IFS=',' read -r CREATED RUN_ID LABEL; do
            if [ "$LABEL" = "Horizon Scanner Triage" ]; then
              SOURCE_KIND="pipeline"
            elif [ "$LABEL" = "Ingest Structured Data" ]; then
              SOURCE_KIND="ingest"
            else
              SOURCE_KIND="backfill"
            fi

            echo "Attempting canonical DB download from ${LABEL} (run ${RUN_ID}, created ${CREATED})"
            rm -rf data/pythia-resolver-db
            rm -f data/resolver.duckdb data/resolver.duckdb.wal
            if ! download_artifact_with_retries "$RUN_ID" "pythia-resolver-db" data 6; then
              echo "Download failed for run ${RUN_ID}; trying next candidate."
              continue
            fi

            if [ -f data/pythia-resolver-db/resolver.duckdb ]; then
              SRC="data/pythia-resolver-db/resolver.duckdb"
            else
              SRC=$(find data -maxdepth 4 -type f -name "resolver.duckdb" | head -n 1 || true)
            fi

            if [ -z "${SRC}" ]; then
              echo "resolver.duckdb not found in downloaded artifact from ${RUN_ID}; trying next candidate."
              continue
            fi

            if [ "$SRC" != "data/resolver.duckdb" ]; then
              cp "$SRC" data/resolver.duckdb
            fi

            # Remove stale WAL files that can crash DuckDB on replay
            rm -f data/resolver.duckdb.wal

            if python -m scripts.ci.db_signature write \
                --db data/resolver.duckdb \
                --required "${SIGNATURE_REQUIRED_TABLES}" \
                --optional "${SIGNATURE_OPTIONAL_TABLES}" \
                --out diagnostics/db_signature_before.json; then
              echo "Candidate signature OK."
            else
              echo "Candidate rejected; missing required tables. Trying next candidate."
              rm -f diagnostics/db_signature_before.json
              continue
            fi

            if [ -f diagnostics/db_signature_before.json ]; then
              FOUND=1
              FOUND_SOURCE="${SOURCE_KIND}"
              FOUND_RUN_ID="${RUN_ID}"
              FOUND_CREATED_AT="${CREATED}"
              break
            fi
          done < "${CANDIDATES_FILE}.sorted"

          if [ "${FOUND}" -ne 1 ]; then
            echo "ERROR: Could not find a valid canonical resolver.duckdb; rerun with reset_db=true to bootstrap."
            exit 1
          fi

          {
            echo "CANONICAL_DB_READY=true"
            echo "CANONICAL_DB_SOURCE=${FOUND_SOURCE}"
            echo "CANONICAL_DB_RUN_ID=${FOUND_RUN_ID}"
            echo "CANONICAL_CREATED_AT=${FOUND_CREATED_AT}"
          } >> "$GITHUB_ENV"

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "### Canonical DB signature (before run)"
              echo "- Source: ${FOUND_SOURCE} (run ${FOUND_RUN_ID})"
              echo "- Created: ${FOUND_CREATED_AT}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Remove existing resolver.duckdb (reset mode only)
        if: github.event_name == 'workflow_dispatch' && inputs.reset_db == 'true'
        run: |
          set -euo pipefail
          rm -f data/resolver.duckdb
          echo "CANONICAL_DB_READY=false" >> "$GITHUB_ENV"

      - name: Ensure schema
        run: |
          set -euo pipefail
          mkdir -p data
          python -c "from pythia.db.schema import ensure_schema; ensure_schema()"

      - name: Prepare diagnostics directories
        run: |
          set -euo pipefail
          mkdir -p diagnostics/ingestion/{logs,raw,metrics,samples,export_preview}

      # === PHASE 1: RESOLVER CONNECTORS (ground truth — fatal) ===
      - name: "Phase 1: Run IDMC (HELIX)"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'idmc') }}
        run: |
          set -euo pipefail
          echo "::group::IDMC (HELIX)"
          python -m resolver.ingestion.idmc.cli \
            --network-mode helix \
            --series flow \
            --enable-export \
            --write-outputs \
            --start "${{ steps.window.outputs.start_iso }}" \
            --end   "${{ steps.window.outputs.end_iso }}" \
            --debug

          # Emit IDMC diagnostics line from its summary.json
          python -c "
          import json, os
          from pathlib import Path
          report_path = os.environ.get('DIAGNOSTICS_REPORT_PATH')
          if not report_path:
              exit(0)
          try:
              from resolver.ingestion.diagnostics_emitter import start_run, finalize_run, append_jsonl
          except ImportError:
              exit(0)
          summary_path = Path('diagnostics/ingestion/idmc/summary.json')
          ctx = start_run('idmc_helix', 'real')
          if summary_path.exists():
              summary = json.loads(summary_path.read_text())
              counts = summary.get('counts', {})
              status = 'ok' if counts.get('written', 0) > 0 else 'error'
              reason = None if status == 'ok' else 'zero-rows-written'
              result = finalize_run(ctx, status, reason=reason, counts={
                  'fetched': counts.get('fetched', 0),
                  'normalized': counts.get('normalized', 0),
                  'written': counts.get('written', 0),
              })
          else:
              result = finalize_run(ctx, 'error', reason='summary.json not found')
          append_jsonl(report_path, result)
          " || true
          echo "::endgroup::"

      - name: "Phase 1: Run connectors (ACLED, IFRC)"
        env:
          RESOLVER_START_ISO: ${{ steps.window.outputs.start_iso }}
          RESOLVER_END_ISO: ${{ steps.window.outputs.end_iso }}
          BACKFILL_START_ISO: ${{ steps.window.outputs.start_iso }}
          BACKFILL_END_ISO: ${{ steps.window.outputs.end_iso }}
          RESOLVER_SKIP_IDMC: "1"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'acled_client') || contains(inputs.only_connector, 'ifrc_go_client') }}
        run: |
          set -euo pipefail
          echo "::group::Connectors (ACLED, IFRC)"
          mkdir -p diagnostics/ingestion/{logs,raw,metrics,samples,export_preview}
          mkdir -p "$(dirname "${BACKFILL_DB_PATH}")"
          python -m scripts.ci.run_connectors
          echo "::endgroup::"

      - name: "Phase 1: ACLED monthly fatalities → DuckDB"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'acled_client') }}
        env:
          BACKFILL_START_ISO: ${{ steps.window.outputs.start_iso }}
          BACKFILL_END_ISO: ${{ steps.window.outputs.end_iso }}
        run: |
          set -euo pipefail
          echo "::group::ACLED monthly fatalities"
          mkdir -p diagnostics/acled
          python -m resolver.cli.acled_to_duckdb \
            --start "${BACKFILL_START_ISO}" \
            --end "${BACKFILL_END_ISO}" \
            --db "${BACKFILL_DB_PATH}" \
            --log-level "${LOG_LEVEL}" \
            2>&1 | tee diagnostics/acled/acled_to_duckdb.log
          echo "::endgroup::"

      - name: "Phase 1: Normalize + load_and_derive → facts_resolved"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'idmc') || contains(inputs.only_connector, 'acled_client') || contains(inputs.only_connector, 'ifrc_go_client') }}
        env:
          BACKFILL_START_ISO: ${{ steps.window.outputs.start_iso }}
          BACKFILL_END_ISO: ${{ steps.window.outputs.end_iso }}
        run: |
          set -euo pipefail
          echo "::group::Normalize and load_and_derive"
          PERIOD_LABEL="$(python -c "
          import os, datetime as dt
          s = os.environ.get('BACKFILL_START_ISO','')
          e = os.environ.get('BACKFILL_END_ISO','')
          if s and e:
              sd = dt.date.fromisoformat(s[:10])
              ed = dt.date.fromisoformat(e[:10])
              sq = (sd.month-1)//3+1
              eq = (ed.month-1)//3+1
              if sd.year==ed.year and sq==eq:
                  print(f'{sd.year}Q{sq}')
              else:
                  print(f'{s[:10]}_{e[:10]}')
          else:
              print('unknown')
          ")"

          CANONICAL_DIR="resolver/staging/${PERIOD_LABEL}/canonical"
          mkdir -p "${CANONICAL_DIR}"
          python -m resolver.transform.normalize \
            --in resolver/staging \
            --out "${CANONICAL_DIR}" \
            --sources ifrc_go,acled,idmc \
            --period "${PERIOD_LABEL}" \
            --log-level "${LOG_LEVEL:-INFO}"

          python -m resolver.tools.load_and_derive \
            --period "${PERIOD_LABEL}" \
            --staging-root resolver/staging \
            --snapshots-root data/snapshots \
            --db "${BACKFILL_DB_PATH}" \
            --allow-negatives 1
          echo "::endgroup::"

      # === PHASE 2: RESOLUTION SOURCES (non-fatal) ===
      - name: "Phase 2: Ingest FEWS NET IPC → facts_resolved"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'fewsnet_ipc') }}
        continue-on-error: true
        run: |
          echo "::group::FEWS NET IPC"
          python -m pythia.tools.ingest_structured_data --sources fewsnet_ipc 2>&1 | tee diagnostics/phase2_fewsnet.log || echo "WARNING: FEWS NET IPC ingest failed (non-fatal)"
          echo "::endgroup::"

      - name: "Phase 2: Ingest IPC API → facts_resolved"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'ipc_api') }}
        continue-on-error: true
        run: |
          echo "::group::IPC API"
          python -m pythia.tools.ingest_structured_data --sources ipc_api 2>&1 | tee diagnostics/phase2_ipc_api.log || echo "WARNING: IPC API ingest failed (non-fatal)"
          echo "::endgroup::"

      - name: "Phase 2: Ingest GDACS → facts_resolved"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'gdacs') }}
        continue-on-error: true
        run: |
          echo "::group::GDACS"
          python -m pythia.tools.ingest_structured_data --sources gdacs 2>&1 | tee diagnostics/phase2_gdacs.log || echo "WARNING: GDACS ingest failed (non-fatal)"
          echo "::endgroup::"

      # === PHASE 3: STRUCTURED DATA — Pythia tables (non-fatal) ===
      - name: "Phase 3: Ingest conflict forecasts"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'conflict') }}
        continue-on-error: true
        run: |
          echo "::group::Conflict forecasts (VIEWS + conflictforecast.org + ACLED CAST)"
          python -m pythia.tools.ingest_structured_data --sources conflict 2>&1 | tee diagnostics/phase3_conflict.log || echo "WARNING: Conflict forecasts ingest failed (non-fatal)"
          echo "::endgroup::"

      - name: "Phase 3: Ingest ACAPS (4 datasets)"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'acaps') }}
        continue-on-error: true
        run: |
          echo "::group::ACAPS"
          python -m pythia.tools.ingest_structured_data --sources acaps 2>&1 | tee diagnostics/phase3_acaps.log || echo "WARNING: ACAPS ingest failed (non-fatal)"
          echo "::endgroup::"

      - name: "Phase 3: Ingest ReliefWeb reports"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'reliefweb') }}
        continue-on-error: true
        run: |
          echo "::group::ReliefWeb"
          python -m pythia.tools.ingest_structured_data --sources reliefweb 2>&1 | tee diagnostics/phase3_reliefweb.log || echo "WARNING: ReliefWeb ingest failed (non-fatal)"
          echo "::endgroup::"

      - name: "Phase 3: Ingest ACLED political events"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'acled_political') }}
        continue-on-error: true
        run: |
          echo "::group::ACLED political"
          python -m pythia.tools.ingest_structured_data --sources acled_political 2>&1 | tee diagnostics/phase3_acled_political.log || echo "WARNING: ACLED political ingest failed (non-fatal)"
          echo "::endgroup::"

      - name: "Phase 3: Ingest NMME seasonal forecasts"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'nmme') }}
        continue-on-error: true
        run: |
          echo "::group::NMME"
          python -m pythia.tools.ingest_structured_data --sources nmme 2>&1 | tee diagnostics/phase3_nmme.log || echo "WARNING: NMME ingest failed (non-fatal)"
          echo "::endgroup::"

      # === PHASE 4: CONTEXT SOURCES (non-fatal) ===
      - name: "Phase 4: Fetch + store ENSO state"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'enso') }}
        continue-on-error: true
        run: |
          set -euo pipefail
          RESULT=$(python -c "
          from horizon_scanner.enso.enso_module import fetch_and_store_enso
          ok = fetch_and_store_enso()
          print('ok' if ok else 'error')
          " 2>&1 | tail -1) || RESULT="error"
          if [ "$RESULT" = "ok" ]; then
            python -m pythia.tools.emit_phase4_diag enso ok --rows 1
            echo "[enso] OK"
          else
            python -m pythia.tools.emit_phase4_diag enso error --reason "fetch-or-store-failed"
            echo "WARNING: ENSO fetch failed (non-fatal)"
          fi

      - name: "Phase 4: Fetch + store Seasonal TC outlooks"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'seasonal_tc') }}
        continue-on-error: true
        run: |
          set -euo pipefail
          RESULT=$(python -c "
          from horizon_scanner.seasonal_tc.seasonal_tc_runner import fetch_and_store_seasonal_tc
          ok = fetch_and_store_seasonal_tc()
          print('ok' if ok else 'error')
          " 2>&1 | tail -1) || RESULT="error"
          if [ "$RESULT" = "ok" ]; then
            python -m pythia.tools.emit_phase4_diag seasonal_tc ok --rows 1
            echo "[seasonal_tc] OK"
          else
            python -m pythia.tools.emit_phase4_diag seasonal_tc error --reason "fetch-or-store-failed"
            echo "WARNING: Seasonal TC fetch failed (non-fatal)"
          fi

      - name: "Phase 4: Store HDX Signals"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'hdx_signals') }}
        continue-on-error: true
        run: |
          set -euo pipefail
          ROWS=$(python -c "
          from horizon_scanner.hdx_signals import bulk_fetch_and_store_hdx_signals
          n = bulk_fetch_and_store_hdx_signals()
          print(n)
          " 2>&1 | tail -1) || ROWS="0"
          if ! echo "$ROWS" | grep -qE '^[0-9]+$'; then
            ROWS="0"
          fi
          if [ "$ROWS" -gt 0 ]; then
            python -m pythia.tools.emit_phase4_diag hdx_signals ok --rows "$ROWS"
            echo "[hdx_signals] OK: stored ${ROWS} signals"
          else
            python -m pythia.tools.emit_phase4_diag hdx_signals error --reason "zero-rows-returned"
            echo "WARNING: HDX Signals fetch failed (non-fatal)"
          fi

      - name: "Phase 4: Store CrisisWatch from JSON"
        if: ${{ inputs.only_connector == '' || contains(inputs.only_connector, 'crisiswatch') }}
        continue-on-error: true
        run: |
          set -euo pipefail
          ROWS=$(python -c "
          from horizon_scanner.crisiswatch import bulk_store_crisiswatch
          n = bulk_store_crisiswatch()
          print(n)
          " 2>&1 | tail -1) || ROWS="0"
          if ! echo "$ROWS" | grep -qE '^[0-9]+$'; then
            ROWS="0"
          fi
          if [ "$ROWS" -gt 0 ]; then
            python -m pythia.tools.emit_phase4_diag crisiswatch ok --rows "$ROWS"
            echo "[crisiswatch] OK: stored ${ROWS} entries"
          else
            python -m pythia.tools.emit_phase4_diag crisiswatch error --reason "zero-rows-or-missing-json"
            echo "WARNING: CrisisWatch store failed (non-fatal)"
          fi

      # === PHASE 5: VERIFY + EXPORT ===
      - name: Verify DuckDB counts
        run: |
          set -euo pipefail
          DB_PATH="${BACKFILL_DB_PATH}"
          python scripts/ci/verify_duckdb_counts.py "${DB_PATH}" \
            --allow-missing \
            --tables acled_monthly_fatalities facts_resolved facts_deltas

      - name: Summarize DuckDB contents
        run: |
          set -euo pipefail
          mkdir -p diagnostics/ingestion
          python -m scripts.ci.duckdb_summary \
            --db "${BACKFILL_DB_PATH}" \
            --tables "acled_monthly_fatalities,facts_resolved,facts_deltas" \
            | tee diagnostics/ingestion/duckdb_summary.md
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat diagnostics/ingestion/duckdb_summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Summarize connector diagnostics
        if: always()
        run: |
          set -euo pipefail
          python -m scripts.ci.summarize_connectors \
            --report diagnostics/ingestion/connectors_report.jsonl \
            --out diagnostics/ingestion/summary.md \
            --github-step-summary || true

      - name: Consolidated pipeline status summary
        if: always()
        run: |
          set -euo pipefail
          python -m pythia.tools.summarize_all_phases \
            --report "${DIAGNOSTICS_REPORT_PATH}" \
            --db "${BACKFILL_DB_PATH}" \
            >> "${GITHUB_STEP_SUMMARY}" || true

      - name: Simple DuckDB snapshot
        run: |
          set -euo pipefail
          python -m resolver.cli.simple_snapshot --db "${BACKFILL_DB_PATH}" || true

      - name: Compute DB signature after backfill
        id: signature_after
        if: ${{ env.CANONICAL_DB_READY == 'true' }}
        run: |
          set -euo pipefail
          python -m scripts.ci.db_signature compare \
            --before diagnostics/db_signature_before.json \
            --after-db "${BACKFILL_DB_PATH}" \
            --required "${SIGNATURE_REQUIRED_TABLES}" \
            --optional "${SIGNATURE_OPTIONAL_TABLES}" \
            --out diagnostics/db_signature_after.json
          echo "SIGNATURE_OK=true" >> "$GITHUB_ENV"
          echo "signature_ok=true" >> "$GITHUB_OUTPUT"

      - name: Upload canonical resolver DB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db
          path: data/resolver.duckdb

      - name: Upload reset resolver DB snapshot
        if: success() && github.event_name == 'workflow_dispatch' && inputs.reset_db == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db-reset
          path: data/resolver.duckdb

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-diagnostics
          path: |
            diagnostics/
          retention-days: 30
          if-no-files-found: warn
