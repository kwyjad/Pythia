# Mid-cycle data refresh. The primary ingestion happens in resolver_update.yml
# (15th monthly). This workflow provides supplementary freshness for fast-changing sources
# between monthly backfills. Its DB artifact is available to the HS workflow as a candidate.

---
name: Ingest Structured Data

concurrency:
  group: pythia-resolver-db
  cancel-in-progress: false

"on":
  workflow_dispatch:
    inputs:
      iso3:
        description: "Optional comma-separated ISO3 filter (default: all countries)"
        required: false
        default: ""
        type: string
      sources:
        description: >-
          Optional source filter (default: fast-changing sources for scheduled runs,
          all for manual). Options: views, conflictforecast, acledcast, acaps (alias
          for all 4 ACAPS sources), acaps_inform_severity, acaps_risk_radar,
          acaps_daily_monitoring, acaps_humanitarian_access, ipc, reliefweb, nmme,
          gdacs, fewsnet_ipc, gdelt. Also accepts: conflict (alias for
          views+conflictforecast+acledcast). Comma or space separated.
        required: false
        default: ""
        type: string
      gdacs_months:
        description: "Number of months to fetch for GDACS (default 3; use 135 for full backfill to 2015)"
        required: false
        default: "3"
        type: string
      fewsnet_months:
        description: "Number of months to fetch for FEWS NET IPC (default 12; use 120 for backfill to 2016)"
        required: false
        default: "12"
        type: string
      dry_run:
        description: "Fetch and process but do not write to DuckDB"
        required: false
        default: false
        type: boolean
  schedule:
    # Weekly refresh of fast-changing sources (Sunday 03:00 UTC)
    - cron: "0 3 * * 0"

permissions:
  contents: read
  actions: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  ingest:
    name: Ingest structured data sources
    runs-on: ubuntu-latest
    env:
      PYTHIA_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      RESOLVER_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      DIAGNOSTICS_REPORT_PATH: diagnostics/ingestion/connectors_report.jsonl
      ACLED_API_KEY: ${{ secrets.ACLED_API_KEY }}
      ACLED_ACCESS_TOKEN: ${{ secrets.ACLED_ACCESS_TOKEN }}
      ACLED_USERNAME: ${{ secrets.ACLED_USERNAME }}
      ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
      ACLED_REFRESH_TOKEN: ${{ secrets.ACLED_REFRESH_TOKEN }}
      ACAPS_USERNAME: ${{ secrets.ACAPS_USERNAME }}
      ACAPS_PASSWORD: ${{ secrets.ACAPS_PASSWORD }}
      IPC_API_KEY: ${{ secrets.IPC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SIGNATURE_REQUIRED_TABLES: questions,hs_triage,question_research,forecasts_ensemble,llm_calls,facts_resolved,facts_deltas,acled_monthly_fatalities
      SIGNATURE_OPTIONAL_TABLES: scenarios,hdx_signals,enso_state,seasonal_tc_outlooks,seasonal_tc_context_cache

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r python_library_requirements.txt

      - name: Install gh CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate gh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      # Canonical discovery via the shared composite action (single home of
      # the candidate list — includes the post-pipeline chain so this run
      # starts from the most-complete DB). Per-candidate signature validation
      # rejects DBs missing required tables.
      - name: Download canonical resolver DB
        id: canonical_download
        uses: ./.github/actions/download-canonical-db
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          validate-cmd: >-
            python -m scripts.ci.db_signature write
            --db data/resolver.duckdb
            --required "${SIGNATURE_REQUIRED_TABLES}"
            --optional "${SIGNATURE_OPTIONAL_TABLES}"
            --out data/db_signature_before.json

      - name: Determine source list for scheduled runs
        id: sources
        run: |
          # For scheduled runs (not manual dispatch), restrict to fast-changing sources
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "sources=conflict gdacs reliefweb acled_political gdelt" >> "$GITHUB_OUTPUT"
            echo "Using fast-changing source list for scheduled run"
          else
            echo "sources=${{ inputs.sources }}" >> "$GITHUB_OUTPUT"
            echo "Using user-specified source list (or all if empty)"
          fi

      - name: Prepare diagnostics directory
        run: mkdir -p diagnostics/ingestion

      - name: Run structured data ingestion
        env:
          GDACS_MONTHS: ${{ inputs.gdacs_months || '3' }}
          FEWSNET_MONTHS: ${{ inputs.fewsnet_months || '12' }}
        run: |
          set -e
          echo "=== Running structured data ingestion ==="

          CMD="python -m pythia.tools.ingest_structured_data"

          ISO3_INPUT="${{ inputs.iso3 }}"
          if [ -n "$ISO3_INPUT" ]; then
            CMD="$CMD --iso3 $ISO3_INPUT"
          fi

          SOURCES="${{ steps.sources.outputs.sources }}"
          if [ -n "$SOURCES" ]; then
            CMD="$CMD --sources $SOURCES"
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          $CMD
          echo "=== Structured data ingestion completed ==="

      - name: Summarize DuckDB contents
        if: always()
        run: |
          set -euo pipefail
          python -m scripts.ci.duckdb_summary \
            --db data/resolver.duckdb \
            --tables "acled_monthly_fatalities,facts_resolved,facts_deltas" \
            | tee diagnostics/ingestion/duckdb_summary.md
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat diagnostics/ingestion/duckdb_summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Consolidated pipeline status summary
        if: always()
        run: |
          set -euo pipefail
          python -m pythia.tools.summarize_all_phases \
            --report "${DIAGNOSTICS_REPORT_PATH}" \
            --db data/resolver.duckdb \
            >> "${GITHUB_STEP_SUMMARY}" || true

      - name: Upload canonical resolver DB
        if: inputs.dry_run != true
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db
          path: data/resolver.duckdb
          retention-days: 90

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-diagnostics
          path: diagnostics/
          retention-days: 30
          if-no-files-found: warn
