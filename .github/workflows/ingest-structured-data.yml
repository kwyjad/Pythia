# Mid-cycle data refresh. The primary ingestion happens in resolver_update.yml
# (15th monthly). This workflow provides supplementary freshness for fast-changing sources
# between monthly backfills. Its DB artifact is available to the HS workflow as a candidate.

---
name: Ingest Structured Data

concurrency:
  group: pythia-resolver-db
  cancel-in-progress: false

"on":
  workflow_dispatch:
    inputs:
      iso3:
        description: "Optional comma-separated ISO3 filter (default: all countries)"
        required: false
        default: ""
        type: string
      sources:
        description: >-
          Optional source filter (default: fast-changing sources for scheduled runs,
          all for manual). Options: views, conflictforecast, acledcast, acaps (alias
          for all 4 ACAPS sources), acaps_inform_severity, acaps_risk_radar,
          acaps_daily_monitoring, acaps_humanitarian_access, ipc, reliefweb, nmme,
          gdacs, fewsnet_ipc. Also accepts: conflict (alias for
          views+conflictforecast+acledcast). Comma or space separated.
        required: false
        default: ""
        type: string
      gdacs_months:
        description: "Number of months to fetch for GDACS (default 3; use 135 for full backfill to 2015)"
        required: false
        default: "3"
        type: string
      fewsnet_months:
        description: "Number of months to fetch for FEWS NET IPC (default 12; use 120 for backfill to 2016)"
        required: false
        default: "12"
        type: string
      dry_run:
        description: "Fetch and process but do not write to DuckDB"
        required: false
        default: false
        type: boolean
  schedule:
    # Weekly refresh of fast-changing sources (Sunday 03:00 UTC)
    - cron: "0 3 * * 0"

permissions:
  contents: read
  actions: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  ingest:
    name: Ingest structured data sources
    runs-on: ubuntu-latest
    env:
      PYTHIA_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      RESOLVER_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      DIAGNOSTICS_REPORT_PATH: diagnostics/ingestion/connectors_report.jsonl
      ACLED_API_KEY: ${{ secrets.ACLED_API_KEY }}
      ACLED_ACCESS_TOKEN: ${{ secrets.ACLED_ACCESS_TOKEN }}
      ACLED_USERNAME: ${{ secrets.ACLED_USERNAME }}
      ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
      ACLED_REFRESH_TOKEN: ${{ secrets.ACLED_REFRESH_TOKEN }}
      ACAPS_USERNAME: ${{ secrets.ACAPS_USERNAME }}
      ACAPS_PASSWORD: ${{ secrets.ACAPS_PASSWORD }}
      IPC_API_KEY: ${{ secrets.IPC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SIGNATURE_REQUIRED_TABLES: questions,hs_triage,question_research,forecasts_ensemble,llm_calls,facts_resolved,facts_deltas,acled_monthly_fatalities
      SIGNATURE_OPTIONAL_TABLES: scenarios,hdx_signals,enso_state,seasonal_tc_outlooks,seasonal_tc_context_cache

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r python_library_requirements.txt

      - name: Install gh CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate gh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Download canonical resolver DB
        id: canonical_download
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data

          download_artifact_with_retries() {
            local run_id="$1"
            local artifact_name="$2"
            local out_dir="$3"
            local max_attempts="${4:-6}"

            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Downloading artifact '${artifact_name}' from run ${run_id} (attempt ${attempt}/${max_attempts})"

              rm -rf "${out_dir}/pythia-resolver-db" || true

              if gh run download "$run_id" -n "$artifact_name" --dir "$out_dir"; then
                echo "Download OK."
                return 0
              fi

              rc=$?
              sleep_seconds=$(( 5 * attempt * attempt ))
              echo "Download failed (exit=${rc}). Sleeping ${sleep_seconds}s before retry..."
              sleep "${sleep_seconds}"
              attempt=$((attempt + 1))
            done

            echo "ERROR: Failed to download artifact '${artifact_name}' from run ${run_id} after ${max_attempts} attempts."
            return 1
          }

          # Collect candidate runs from Horizon Scanner Triage, Resolver Update, and Ingest Structured Data
          CANDIDATES_FILE=$(mktemp)
          gh run list \
            --workflow "Horizon Scanner Triage" \
            --branch main \
            --status success \
            --json databaseId,createdAt \
            --limit 20 | jq -r '.[] | "\(.createdAt),\(.databaseId),Horizon Scanner Triage"' >>"${CANDIDATES_FILE}" || true
          gh run list \
            --workflow "Resolver Update" \
            --branch main \
            --status success \
            --json databaseId,createdAt \
            --limit 20 | jq -r '.[] | "\(.createdAt),\(.databaseId),Resolver Update"' >>"${CANDIDATES_FILE}" || true
          gh run list \
            --workflow "Ingest Structured Data" \
            --branch main \
            --status success \
            --json databaseId,createdAt \
            --limit 20 | jq -r '.[] | "\(.createdAt),\(.databaseId),Ingest Structured Data"' >>"${CANDIDATES_FILE}" || true

          if [ ! -s "${CANDIDATES_FILE}" ]; then
            echo "ERROR: No successful runs found."
            exit 1
          fi

          sort -r "${CANDIDATES_FILE}" > "${CANDIDATES_FILE}.sorted"

          FOUND=0

          while IFS=',' read -r CREATED RUN_ID LABEL; do
            rm -rf data/pythia-resolver-db
            rm -f data/resolver.duckdb

            if ! download_artifact_with_retries "$RUN_ID" "pythia-resolver-db" data 6; then
              echo "Download failed for run ${RUN_ID}; trying next candidate."
              continue
            fi

            if [ -f data/pythia-resolver-db/resolver.duckdb ]; then
              SRC="data/pythia-resolver-db/resolver.duckdb"
            else
              SRC=$(find data -maxdepth 4 -type f -name "resolver.duckdb" | head -n 1 || true)
            fi

            if [ -z "${SRC}" ]; then
              echo "resolver.duckdb not found in artifact from ${RUN_ID}; trying next candidate."
              continue
            fi

            if [ "$SRC" != "data/resolver.duckdb" ]; then
              cp "$SRC" data/resolver.duckdb
            fi

            # Validate DB signature
            if python -m scripts.ci.db_signature write \
                --db data/resolver.duckdb \
                --required "${SIGNATURE_REQUIRED_TABLES}" \
                --optional "${SIGNATURE_OPTIONAL_TABLES}" \
                --out data/db_signature_before.json; then
              FOUND=1
              echo "Canonical DB from run ${RUN_ID} (${LABEL}, ${CREATED}) validated OK."
              break
            else
              echo "Candidate rejected; missing required tables. Trying next candidate."
            fi
          done < "${CANDIDATES_FILE}.sorted"

          if [ "${FOUND}" -ne 1 ]; then
            echo "ERROR: No valid canonical DB found."
            exit 1
          fi

      - name: Determine source list for scheduled runs
        id: sources
        run: |
          # For scheduled runs (not manual dispatch), restrict to fast-changing sources
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "sources=conflict gdacs reliefweb acled_political" >> "$GITHUB_OUTPUT"
            echo "Using fast-changing source list for scheduled run"
          else
            echo "sources=${{ inputs.sources }}" >> "$GITHUB_OUTPUT"
            echo "Using user-specified source list (or all if empty)"
          fi

      - name: Prepare diagnostics directory
        run: mkdir -p diagnostics/ingestion

      - name: Run structured data ingestion
        env:
          GDACS_MONTHS: ${{ inputs.gdacs_months || '3' }}
          FEWSNET_MONTHS: ${{ inputs.fewsnet_months || '12' }}
        run: |
          set -e
          echo "=== Running structured data ingestion ==="

          CMD="python -m pythia.tools.ingest_structured_data"

          ISO3_INPUT="${{ inputs.iso3 }}"
          if [ -n "$ISO3_INPUT" ]; then
            CMD="$CMD --iso3 $ISO3_INPUT"
          fi

          SOURCES="${{ steps.sources.outputs.sources }}"
          if [ -n "$SOURCES" ]; then
            CMD="$CMD --sources $SOURCES"
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          $CMD
          echo "=== Structured data ingestion completed ==="

      - name: Summarize DuckDB contents
        if: always()
        run: |
          set -euo pipefail
          python scripts/ci/duckdb_summary.py \
            --db data/resolver.duckdb \
            --tables "acled_monthly_fatalities,facts_resolved,facts_deltas" \
            | tee diagnostics/ingestion/duckdb_summary.md
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat diagnostics/ingestion/duckdb_summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Consolidated pipeline status summary
        if: always()
        run: |
          set -euo pipefail
          python -m pythia.tools.summarize_all_phases \
            --report "${DIAGNOSTICS_REPORT_PATH}" \
            --db data/resolver.duckdb \
            >> "${GITHUB_STEP_SUMMARY}" || true

      - name: Upload canonical resolver DB
        if: inputs.dry_run != true
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db
          path: data/resolver.duckdb
          retention-days: 90

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-diagnostics
          path: diagnostics/
          retention-days: 30
          if-no-files-found: warn
