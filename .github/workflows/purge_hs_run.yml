---
name: Purge HS Run

concurrency:
  group: pythia-resolver-db
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      hs_run_id:
        description: "HS run ID to purge (e.g. hs_20260301T000000)"
        required: true
        type: string
      db_run_id:
        description: "Optional: force canonical DB from Actions run ID. If blank, uses the latest successful pipeline run."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

jobs:
  purge:
    runs-on: ubuntu-latest
    env:
      RESOLVER_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      PYTHIA_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      SIGNATURE_REQUIRED_TABLES: questions,hs_triage,question_research,forecasts_ensemble,llm_calls,facts_resolved,facts_deltas,acled_monthly_fatalities
      SIGNATURE_OPTIONAL_TABLES: scenarios

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install gh CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate gh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r python_library_requirements.txt

      # Forced mode: operator-supplied db_run_id (fatal if unavailable).
      # Otherwise canonical discovery via the shared composite action, with
      # this workflow's own prior runs included as extra candidates.
      - name: Download canonical resolver DB
        uses: ./.github/actions/download-canonical-db
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          force-run-id: ${{ github.event.inputs.db_run_id }}
          extra-workflows: Purge HS Run

      - name: DB signature before purge
        run: |
          set -e
          mkdir -p diagnostics
          python -m scripts.ci.db_signature write \
            --db data/resolver.duckdb \
            --required "${SIGNATURE_REQUIRED_TABLES}" \
            --optional "${SIGNATURE_OPTIONAL_TABLES}" \
            --out diagnostics/db_signature_before.json

      - name: "Dry run: preview rows to delete"
        env:
          PYTHIA_DB_URL: ${{ env.RESOLVER_DB_URL }}
        run: |
          set -e
          echo "=== Dry-run purge preview for hs_run_id=${{ github.event.inputs.hs_run_id }} ==="
          python -m scripts.purge_hs_run \
            --db "${PYTHIA_DB_URL}" \
            --hs-run-id "${{ github.event.inputs.hs_run_id }}" | tee diagnostics/purge_dry_run.txt

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "### Purge dry-run preview"
              echo '```'
              cat diagnostics/purge_dry_run.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: "Execute purge"
        env:
          PYTHIA_DB_URL: ${{ env.RESOLVER_DB_URL }}
        run: |
          set -e
          echo "=== Executing purge for hs_run_id=${{ github.event.inputs.hs_run_id }} ==="
          python -m scripts.purge_hs_run \
            --db "${PYTHIA_DB_URL}" \
            --hs-run-id "${{ github.event.inputs.hs_run_id }}" \
            --execute | tee diagnostics/purge_execute.txt

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "### Purge execution result"
              echo '```'
              cat diagnostics/purge_execute.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: DB signature after purge
        run: |
          set -e
          python -m scripts.ci.db_signature write \
            --db data/resolver.duckdb \
            --required "${SIGNATURE_REQUIRED_TABLES}" \
            --optional "${SIGNATURE_OPTIONAL_TABLES}" \
            --out diagnostics/db_signature_after.json

          if [ -f diagnostics/db_signature_before.json ]; then
            python -m scripts.ci.db_signature compare \
              --before diagnostics/db_signature_before.json \
              --after-db data/resolver.duckdb \
              --required "${SIGNATURE_REQUIRED_TABLES}" \
              --optional "${SIGNATURE_OPTIONAL_TABLES}" \
              --out diagnostics/db_signature_after.json
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: purge-diagnostics
          path: |
            diagnostics/purge_dry_run.txt
            diagnostics/purge_execute.txt
            diagnostics/db_signature_before.json
            diagnostics/db_signature_after.json
          if-no-files-found: warn

      - name: Upload purged canonical DB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db
          path: data/resolver.duckdb
