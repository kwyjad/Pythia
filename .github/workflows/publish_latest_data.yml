name: Publish Latest Data (Release)

on:
  workflow_run:
    workflows:
      - "Horizon Scanner Triage"
      - "Resolver Update"
      - "Pythia — Compute Calibration Weights & Advice"
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Optional: GitHub Actions run ID to publish pythia-resolver-db from. Leave blank to auto-discover the most recent successful upstream run."
        required: false
        default: ""
      force_publish:
        description: "Bypass the regression check that prevents publishing a DB with fewer post-pipeline rows (resolutions/scores/bucket_centroids) than the current release. Use only if you intentionally want to roll back."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write   # needed to upload release assets
  actions: read     # needed to download artifacts from workflow_run

concurrency:
  group: pythia-publish-latest-data
  cancel-in-progress: false

jobs:
  publish:
    # Run on manual dispatch always, or on successful workflow_run events.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: pythia-data-latest
      DB_ARTIFACT_NAME: pythia-resolver-db
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Resolve source run_id (input → workflow_run → canonical discovery)
        id: resolve_run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          ARTIFACT_NAME: ${{ env.DB_ARTIFACT_NAME }}
        run: |
          set -euo pipefail

          # Priority 1: explicit input (manual dispatch with run_id)
          if [ -n "${INPUT_RUN_ID}" ]; then
            echo "Using run_id from workflow_dispatch input: ${INPUT_RUN_ID}"
            echo "run_id=${INPUT_RUN_ID}" >> "$GITHUB_OUTPUT"
            echo "source=input" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Priority 2: triggering workflow_run (scheduled/automatic path)
          if [ -n "${WORKFLOW_RUN_ID}" ]; then
            echo "Using run_id from triggering workflow_run: ${WORKFLOW_RUN_ID}"
            echo "run_id=${WORKFLOW_RUN_ID}" >> "$GITHUB_OUTPUT"
            echo "source=workflow_run" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Priority 3: canonical discovery — most recent successful run from upstream workflows
          echo "No run_id provided; searching for most recent successful upstream run with '${ARTIFACT_NAME}'..."
          CANDIDATES_FILE=$(mktemp)

          for WF in \
            "Resolver Update" \
            "Horizon Scanner Triage" \
            "Pythia — Compute Calibration Weights & Advice" \
            "Pythia — Compute SPD Scores" \
            "Ingest Structured Data"
          do
            gh run list \
              --workflow "${WF}" \
              --branch main --status success \
              --json databaseId,createdAt --limit 10 \
              | jq -r --arg LABEL "${WF}" '.[] | "\(.createdAt),\(.databaseId),\($LABEL)"' >>"${CANDIDATES_FILE}" || true
          done

          if [ ! -s "${CANDIDATES_FILE}" ]; then
            echo "::error::No successful upstream runs found for canonical discovery."
            exit 1
          fi

          sort -r "${CANDIDATES_FILE}" > "${CANDIDATES_FILE}.sorted"

          while IFS=',' read -r CREATED CAND_RUN_ID LABEL; do
            echo "Checking ${LABEL} run ${CAND_RUN_ID} (${CREATED}) for artifact..."
            JSON="$(gh api -H "Accept: application/vnd.github+json" "/repos/${REPO}/actions/runs/${CAND_RUN_ID}/artifacts" 2>/dev/null || echo '{}')"
            HAS_ART="$(echo "${JSON}" | jq -r --arg NAME "${ARTIFACT_NAME}" '.artifacts[]? | select(.name==$NAME and .expired==false) | .id' | head -n 1 || true)"
            if [ -n "${HAS_ART}" ] && [ "${HAS_ART}" != "null" ]; then
              echo "Selected ${LABEL} run ${CAND_RUN_ID} (artifact id=${HAS_ART})"
              echo "run_id=${CAND_RUN_ID}" >> "$GITHUB_OUTPUT"
              echo "source=discovered:${LABEL}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done < "${CANDIDATES_FILE}.sorted"

          echo "::error::No upstream run had a non-expired '${ARTIFACT_NAME}' artifact."
          exit 1

      - name: Wait for DB artifact to be visible (retry)
        id: wait_artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.resolve_run.outputs.run_id }}
          REPO: ${{ github.repository }}
          ARTIFACT_NAME: ${{ env.DB_ARTIFACT_NAME }}
        run: |
          set -euo pipefail
          echo "Triggering workflow run id: ${RUN_ID}"
          echo "Looking for artifact: ${ARTIFACT_NAME}"

          for attempt in $(seq 1 12); do
            echo "Attempt ${attempt}/12: listing artifacts for run ${RUN_ID}"
            JSON="$(gh api -H "Accept: application/vnd.github+json" "/repos/${REPO}/actions/runs/${RUN_ID}/artifacts")"

            # Print what GitHub thinks exists (for debugging)
            echo "${JSON}" | jq -r '.artifacts[]? | "\(.name)\tID=\(.id)\tEXPIRED=\(.expired)\tSIZE=\(.size_in_bytes)"' || true

            ART_ID="$(echo "${JSON}" | jq -r --arg NAME "${ARTIFACT_NAME}" '.artifacts[]? | select(.name==$NAME) | .id' | head -n 1)"
            ART_URL="$(echo "${JSON}" | jq -r --arg NAME "${ARTIFACT_NAME}" '.artifacts[]? | select(.name==$NAME) | .archive_download_url' | head -n 1)"
            if [ -n "${ART_ID}" ] && [ "${ART_ID}" != "null" ] && [ -n "${ART_URL}" ] && [ "${ART_URL}" != "null" ]; then
              echo "Found artifact id: ${ART_ID}"
              echo "Found archive_download_url: ${ART_URL}"
              echo "artifact_id=${ART_ID}" >> "$GITHUB_OUTPUT"
              echo "archive_download_url=${ART_URL}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 10
          done

          echo "::error::Artifact '${ARTIFACT_NAME}' not found for run ${RUN_ID} after retries."
          exit 1

      - name: Download DB artifact zip (curl + archive_download_url)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCHIVE_URL: ${{ steps.wait_artifact.outputs.archive_download_url }}
        run: |
          set -euo pipefail
          mkdir -p downloaded_artifact
          echo "Downloading artifact zip from archive_download_url..."
          echo "${ARCHIVE_URL}"

          # Download zip; follow redirects (GitHub returns a redirect to blob storage)
          curl -sSL -L \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${ARCHIVE_URL}" \
            -o artifact.zip
          if [ ! -s artifact.zip ]; then
            echo "::error::artifact.zip is empty; download failed."
            exit 1
          fi

          # Verify it’s actually a zip (catches HTML/JSON error bodies)
          if ! unzip -tq artifact.zip >/dev/null 2>&1; then
            echo "::error::artifact.zip is not a valid zip. Showing first 40 lines:"
            head -n 40 artifact.zip || true
            exit 1
          fi

          unzip -q artifact.zip -d downloaded_artifact
          echo "Downloaded artifact contents:"
          find downloaded_artifact -maxdepth 4 -type f -print || true

      - name: Locate resolver.duckdb
        id: locate_db
        run: |
          set -euo pipefail
          echo "Downloaded artifact contents:"
          find downloaded_artifact -maxdepth 4 -type f -print || true

          DB_PATH="$(find downloaded_artifact -type f -name '*.duckdb' | head -n 1 || true)"
          if [ -z "${DB_PATH}" ]; then
            echo "ERROR: No .duckdb found inside artifact '${DB_ARTIFACT_NAME}'."
            exit 1
          fi

          echo "Found DB at: ${DB_PATH}"
          mkdir -p data_out
          cp -f "${DB_PATH}" data_out/resolver.duckdb

          echo "db_path=data_out/resolver.duckdb" >> "$GITHUB_OUTPUT"

      - name: Compute DB sha256
        id: sha
        run: |
          set -euo pipefail
          SHA="$(sha256sum data_out/resolver.duckdb | awk '{print $1}')"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Regression guard — block stale DB overwriting newer release
        id: regression_guard
        env:
          FORCE_PUBLISH: ${{ inputs.force_publish }}
          AUTO_TRIGGER: ${{ github.event_name == 'workflow_run' && '1' || '0' }}
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip >/dev/null
          pip install duckdb >/dev/null

          # Download the currently-published DB (if any) for comparison.
          # If the release doesn't exist yet, skip the check.
          mkdir -p current_release
          if gh release view "${RELEASE_TAG}" -R "${GH_REPO}" >/dev/null 2>&1; then
            if gh release download "${RELEASE_TAG}" -R "${GH_REPO}" \
                 --pattern "resolver.duckdb" \
                 --dir current_release --clobber; then
              echo "Downloaded current release DB for comparison."
            else
              echo "WARN: Could not download current release DB; skipping regression check."
              exit 0
            fi
          else
            echo "Release ${RELEASE_TAG} does not exist yet; skipping regression check."
            exit 0
          fi

          # Strip stale WAL files (DuckDB read-only open will fail on WAL replay otherwise).
          rm -f current_release/resolver.duckdb.wal data_out/resolver.duckdb.wal

          python - <<'PY'
          import os
          import sys
          import duckdb

          NEW_DB = "data_out/resolver.duckdb"
          OLD_DB = "current_release/resolver.duckdb"
          force = os.environ.get("FORCE_PUBLISH", "false").lower() in ("true", "1", "yes")
          auto_trigger = os.environ.get("AUTO_TRIGGER", "0") == "1"

          # Tables to compare. (table_name, where_clause_or_None) — counts
          # only "post-pipeline" output rows. bucket_centroids excludes the
          # seed wildcards (hazard_code='*') and only counts EMA updates
          # (as_of_month IS NOT NULL).
          checks = [
            ("resolutions", None),
            ("scores", None),
            ("bucket_centroids",
             "hazard_code <> '*' AND as_of_month IS NOT NULL"),
            ("calibration_weights", None),
            ("calibration_advice", None),
          ]

          def count(db_path: str, table: str, where: str | None) -> int | None:
            """Return COUNT(*) or None if table doesn't exist."""
            try:
              con = duckdb.connect(db_path, read_only=True)
            except Exception as exc:
              print(f"  ! could not open {db_path}: {exc}")
              return None
            try:
              has = con.execute(
                "SELECT 1 FROM information_schema.tables "
                "WHERE table_name = ? LIMIT 1",
                [table],
              ).fetchone()
              if not has:
                return None
              sql = f"SELECT COUNT(*) FROM {table}"
              if where:
                sql += f" WHERE {where}"
              return int(con.execute(sql).fetchone()[0])
            finally:
              con.close()

          regressions: list[str] = []
          print("Regression guard — comparing new DB to current release:")
          print(f"  new: {NEW_DB}")
          print(f"  old: {OLD_DB}")
          for table, where in checks:
            new_n = count(NEW_DB, table, where)
            old_n = count(OLD_DB, table, where)
            label = table + (f" (where {where})" if where else "")
            print(f"  {label}: new={new_n} old={old_n}")
            # Only flag a regression when the OLD DB has data and the NEW
            # DB has strictly less. Missing tables in the new DB count as
            # zero (regression). Missing tables in the old DB are skipped
            # (first-time publish or pre-existing schema gap).
            if old_n is None or old_n == 0:
              continue
            new_effective = 0 if new_n is None else new_n
            if new_effective < old_n:
              regressions.append(
                f"{label}: new={new_effective} < old={old_n}"
              )

          out_path = os.environ.get("GITHUB_OUTPUT")

          def _set_output(name: str, value: str) -> None:
            if not out_path:
              return
            with open(out_path, "a", encoding="utf-8") as fh:
              fh.write(f"{name}={value}\n")

          if not regressions:
            print("OK: no regressions detected.")
            _set_output("skip_publish", "false")
            sys.exit(0)

          print()
          print("REGRESSION DETECTED in candidate DB:")
          for line in regressions:
            print(f"  - {line}")
          print()
          if force:
            print("force_publish=true — overriding regression guard and "
                  "proceeding with publish.")
            _set_output("skip_publish", "false")
            sys.exit(0)
          if auto_trigger:
            print("Auto-trigger (workflow_run): skipping publish gracefully "
                  "instead of failing. The current release already has more "
                  "post-pipeline data than this candidate DB, so no publish "
                  "is needed. Use workflow_dispatch with force_publish=true "
                  "to intentionally roll back.")
            _set_output("skip_publish", "true")
            sys.exit(0)
          print("Refusing to publish a DB with fewer post-pipeline rows "
                "than the current release. Re-run with force_publish=true "
                "if this rollback is intentional, or pick a run_id whose "
                "artifact has the missing data.")
          sys.exit(1)
          PY

      - name: Build manifest.json (best-effort hs_run_id)
        if: ${{ steps.regression_guard.outputs.skip_publish != 'true' }}
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip >/dev/null
          pip install duckdb >/dev/null

          python - <<'PY'
          import json, os, datetime
          import duckdb

          db_path = "data_out/resolver.duckdb"
          event = {
            "created_utc": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
            "source_workflow": os.environ.get("GITHUB_WORKFLOW", ""),
            "source_run_id": os.environ.get("GITHUB_RUN_ID", ""),
            "source_created_at": os.environ.get("GITHUB_EVENT_WORKFLOW_RUN_CREATED_AT", ""),
            "head_sha": os.environ.get("GITHUB_EVENT_WORKFLOW_RUN_HEAD_SHA", ""),
            "release_tag": os.environ.get("RELEASE_TAG", ""),
            "db_asset": "resolver.duckdb",
            "db_sha256": os.environ.get("DB_SHA256", ""),
            "latest_hs_run_id": None,
            "latest_hs_created_at": None,
            "table_counts": {},
          }

          # Try to read latest HS run from DB if table exists
          try:
            con = duckdb.connect(db_path, read_only=True)
            try:
              # hs_runs is expected in your pipeline DB
              row = con.execute(
                "SELECT run_id, created_at FROM hs_runs ORDER BY created_at DESC LIMIT 1"
              ).fetchone()
              if row:
                event["latest_hs_run_id"] = row[0]
                event["latest_hs_created_at"] = str(row[1])

              # Stamp post-pipeline table counts so the regression guard
              # and downstream debugging can see at a glance whether the
              # published DB has resolutions/scores/calibration data.
              for table, where in (
                ("resolutions", None),
                ("scores", None),
                ("bucket_centroids",
                 "hazard_code <> '*' AND as_of_month IS NOT NULL"),
                ("calibration_weights", None),
                ("calibration_advice", None),
              ):
                try:
                  has = con.execute(
                    "SELECT 1 FROM information_schema.tables "
                    "WHERE table_name = ? LIMIT 1",
                    [table],
                  ).fetchone()
                  if not has:
                    event["table_counts"][table] = None
                    continue
                  sql = f"SELECT COUNT(*) FROM {table}"
                  if where:
                    sql += f" WHERE {where}"
                  event["table_counts"][table] = int(
                    con.execute(sql).fetchone()[0]
                  )
                except Exception:
                  event["table_counts"][table] = None
            finally:
              con.close()
          except Exception:
            # best-effort only; leave nulls
            pass

          with open("data_out/manifest.json", "w", encoding="utf-8") as f:
            json.dump(event, f, indent=2, sort_keys=True)

          print("Wrote data_out/manifest.json")
          PY
        env:
          DB_SHA256: ${{ steps.sha.outputs.sha256 }}
          GITHUB_EVENT_WORKFLOW_RUN_CREATED_AT: ${{ github.event.workflow_run.created_at }}
          GITHUB_EVENT_WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Ensure release exists (create if missing)
        if: ${{ steps.regression_guard.outputs.skip_publish != 'true' }}
        run: |
          set -euo pipefail
          echo "Repo: ${GH_REPO}"
          echo "Release tag: ${RELEASE_TAG}"

          if gh release view "${RELEASE_TAG}" -R "${GH_REPO}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} exists."
          else
            echo "Creating release ${RELEASE_TAG}..."
            gh release create "${RELEASE_TAG}" \
              -R "${GH_REPO}" \
              --title "Pythia – Latest Data" \
              --notes "Automated latest-data release."
          fi

      - name: Upload resolver.duckdb + manifest.json to release (overwrite)
        if: ${{ steps.regression_guard.outputs.skip_publish != 'true' }}
        run: |
          set -euo pipefail
          ls -lh data_out || true
          gh release upload "${RELEASE_TAG}" \
            -R "${GH_REPO}" \
            data_out/resolver.duckdb \
            data_out/manifest.json \
            --clobber
