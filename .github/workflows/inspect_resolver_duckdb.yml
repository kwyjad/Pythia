name: Inspect Resolver DuckDB

on:
  workflow_dispatch:
    inputs:
      backfill_run_id:
        description: "Run ID of the workflow that produced pythia-resolver-db/resolver.duckdb"
        required: true
        type: string
      artifact_name:
        description: "Artifact name to download (default: pythia-resolver-db)"
        required: false
        default: "pythia-resolver-db"
        type: string

  workflow_run:
    workflows: ["Resolver Update"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  inspect-resolver-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install duckdb and gh
        run: |
          python -m pip install --upgrade pip
          python -m pip install duckdb
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate gh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Determine backfill run ID
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_RUN_ID: ${{ inputs.backfill_run_id }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "BACKFILL_RUN_ID=${WORKFLOW_RUN_ID}" >> "$GITHUB_ENV"
            echo "Using workflow_run.id=${WORKFLOW_RUN_ID}"
          else
            echo "BACKFILL_RUN_ID=${DISPATCH_RUN_ID}" >> "$GITHUB_ENV"
            echo "Using dispatch input backfill_run_id=${DISPATCH_RUN_ID}"
          fi

      - name: Download canonical resolver DB from backfill run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ${{ inputs.artifact_name || 'pythia-resolver-db' }}
        run: |
          mkdir -p data

          echo "Downloading ${ARTIFACT_NAME} for run $BACKFILL_RUN_ID ..."
          gh run download "$BACKFILL_RUN_ID" -n "${ARTIFACT_NAME}" --dir data

          echo "Artifacts downloaded under data/:"
          ls -R data

          # Canonical layout: data/pythia-resolver-db/resolver.duckdb
          if [ -f data/pythia-resolver-db/resolver.duckdb ]; then
            SRC="data/pythia-resolver-db/resolver.duckdb"
          else
            # Fallback: search any resolver.duckdb
            SRC=$(find data -maxdepth 4 -type f -name "resolver.duckdb" | head -n 1 || true)
          fi

          if [ -n "$SRC" ]; then
            echo "Found resolver DB at $SRC"
            if [ "$SRC" != "data/resolver.duckdb" ]; then
              cp "$SRC" data/resolver.duckdb
            else
              echo "DB already at canonical path data/resolver.duckdb; no copy needed."
            fi
            rm -f data/resolver.duckdb.wal
          fi

          if [ ! -f data/resolver.duckdb ]; then
            echo "ERROR: resolver.duckdb not found in ${ARTIFACT_NAME} for run $BACKFILL_RUN_ID"
            ls -R data
            exit 1
          fi

          DB_SIZE=$(du -h data/resolver.duckdb | cut -f1)
          echo "Database size: ${DB_SIZE}"

      - name: Inspect data/resolver.duckdb
        run: |
          python -m scripts.ci.inspect_resolver_db \
            --db data/resolver.duckdb \
            --out resolver_inspect.md

      - name: Upload resolver inspection artifact
        uses: actions/upload-artifact@v4
        with:
          name: resolver-inspect
          path: resolver_inspect.md
