---
name: Pythia — Compute Calibration Weights & Advice

on:
  workflow_run:
    workflows: ["Pythia — Compute SPD Scores"]
    types: [completed]

  # Optional manual trigger
  workflow_dispatch: {}

concurrency:
  group: pythia-resolver-db
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  compute-calibration:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      RESOLVER_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install -r python_library_requirements.txt
          pip install duckdb

      - name: Download canonical resolver DB
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          rm -rf data/pythia-resolver-db
          rm -f data/resolver.duckdb data/resolver.duckdb.wal

          # ── Helper: locate resolver.duckdb inside downloaded artifact ──
          locate_and_copy_db() {
            if [ -f data/pythia-resolver-db/resolver.duckdb ]; then
              SRC="data/pythia-resolver-db/resolver.duckdb"
            else
              SRC=$(find data -maxdepth 4 -type f -name "resolver.duckdb" | head -n 1 || true)
            fi
            if [ -z "${SRC}" ]; then
              return 1
            fi
            if [ "$SRC" != "data/resolver.duckdb" ]; then
              cp "$SRC" data/resolver.duckdb
            fi
            rm -f data/resolver.duckdb.wal
            return 0
          }

          # ── Path A: triggered by workflow_run — download from triggering run ──
          RUN_ID="${{ github.event.workflow_run.id }}"
          if [ -n "$RUN_ID" ]; then
            echo "Downloading pythia-resolver-db from triggering run $RUN_ID"
            if gh run download "$RUN_ID" -n pythia-resolver-db --dir data && locate_and_copy_db; then
              echo "Found resolver DB from triggering run $RUN_ID"
              ls -lh data/resolver.duckdb
              exit 0
            fi
            echo "WARNING: Could not download from triggering run $RUN_ID; falling back to canonical discovery."
            rm -rf data/pythia-resolver-db
          fi

          # ── Path B: manual dispatch or fallback — canonical discovery ──
          echo "Searching for most recent pythia-resolver-db artifact..."
          CANDIDATES_FILE=$(mktemp)

          gh run list \
            --workflow "Pythia — Compute SPD Scores" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Compute SPD Scores"' >>"${CANDIDATES_FILE}" || true

          gh run list \
            --workflow "Pythia — Compute Calibration Weights & Advice" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Compute Calibration"' >>"${CANDIDATES_FILE}" || true

          gh run list \
            --workflow "Horizon Scanner Triage" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Horizon Scanner Triage"' >>"${CANDIDATES_FILE}" || true

          gh run list \
            --workflow "Ingest Structured Data" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Ingest Structured Data"' >>"${CANDIDATES_FILE}" || true

          gh run list \
            --workflow "Resolver Update" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Resolver Update"' >>"${CANDIDATES_FILE}" || true

          if [ ! -s "${CANDIDATES_FILE}" ]; then
            echo "ERROR: No successful workflow runs found with pythia-resolver-db artifact."
            exit 1
          fi

          sort -r "${CANDIDATES_FILE}" > "${CANDIDATES_FILE}.sorted"

          FOUND=0
          while IFS=',' read -r CREATED CAND_RUN_ID LABEL; do
            echo "Trying ${LABEL} run ${CAND_RUN_ID} (${CREATED})..."
            rm -rf data/pythia-resolver-db
            rm -f data/resolver.duckdb data/resolver.duckdb.wal

            if gh run download "$CAND_RUN_ID" -n pythia-resolver-db --dir data && locate_and_copy_db; then
              echo "Found resolver DB from ${LABEL} run ${CAND_RUN_ID}"
              ls -lh data/resolver.duckdb
              FOUND=1
              break
            fi
          done < "${CANDIDATES_FILE}.sorted"

          if [ "${FOUND}" -ne 1 ]; then
            echo "ERROR: No valid pythia-resolver-db artifact found."
            exit 1
          fi

      - name: EMA centroid update
        env:
          PYTHIA_CONFIG_YAML: "pythia/config.yaml"
        run: |
          echo "=== Running EMA centroid update ==="
          python -m pythia.tools.compute_bucket_centroids --ema --metric PA --db-url "${RESOLVER_DB_URL}"
          echo "=== EMA centroid update completed ==="

      - name: Compute calibration weights/advice from scores
        env:
          PYTHIA_CONFIG_YAML: "pythia/config.yaml"
        run: |
          echo "=== Running pythia.tools.compute_calibration_pythia ==="
          python -m pythia.tools.compute_calibration_pythia --db-url "${RESOLVER_DB_URL}"
          echo "=== compute_calibration_pythia completed ==="

      - name: Generate concrete calibration advice
        env:
          PYTHIA_CONFIG_YAML: "pythia/config.yaml"
        run: |
          echo "=== Running pythia.tools.generate_calibration_advice ==="
          python -m pythia.tools.generate_calibration_advice --db-url "${RESOLVER_DB_URL}"
          echo "=== generate_calibration_advice completed ==="

      - name: Upload canonical resolver DB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db
          path: data/resolver.duckdb
