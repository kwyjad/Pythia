---
name: Pythia — Compute Calibration Weights & Advice

on:
  workflow_run:
    workflows: ["Pythia — Compute SPD Scores"]
    types: [completed]

  # Optional manual trigger
  workflow_dispatch: {}

concurrency:
  group: pythia-resolver-db
  cancel-in-progress: false

permissions:
  contents: read
  actions: write   # needed to dispatch publish_latest_data.yml at the end of the chain

jobs:
  compute-calibration:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      RESOLVER_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install -r python_library_requirements.txt
          pip install duckdb

      # Path A: triggering Compute SPD Scores run; Path B (manual dispatch or
      # expired artifact): canonical discovery. Shared logic + candidate list
      # live in .github/actions/download-canonical-db.
      - name: Download canonical resolver DB
        uses: ./.github/actions/download-canonical-db
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Retire blocked-hazard questions (DI / HW / CU / ACO)
        env:
          PYTHIA_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
        run: |
          echo "=== Retiring blocked-hazard questions ==="
          python -m scripts.retire_blocked_hazard_questions
          echo "=== retire_blocked_hazard_questions completed ==="

      - name: Seed and update bucket centroids
        env:
          PYTHIA_CONFIG_YAML: "pythia/config.yaml"
          PYTHIA_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
        run: |
          echo "=== Seeding bucket centroids from BUCKET_SPECS ==="
          python -m scripts.db.update_bucket_centroids
          echo "=== EMA centroid update (all metrics) ==="
          for METRIC in PA FATALITIES EVENT_OCCURRENCE PHASE3PLUS_IN_NEED; do
            echo "--- metric=${METRIC} ---"
            python -m pythia.tools.compute_bucket_centroids --ema --metric "${METRIC}" --db-url "${RESOLVER_DB_URL}" \
              || echo "WARN: EMA update failed for metric=${METRIC} (non-fatal)"
          done
          echo "=== Centroid update completed ==="

      - name: Compute calibration weights/advice from scores
        env:
          PYTHIA_CONFIG_YAML: "pythia/config.yaml"
        run: |
          echo "=== Running pythia.tools.compute_calibration_pythia ==="
          python -m pythia.tools.compute_calibration_pythia --db-url "${RESOLVER_DB_URL}"
          echo "=== compute_calibration_pythia completed ==="

      - name: Generate concrete calibration advice
        env:
          PYTHIA_CONFIG_YAML: "pythia/config.yaml"
        run: |
          echo "=== Running pythia.tools.generate_calibration_advice ==="
          python -m pythia.tools.generate_calibration_advice --db-url "${RESOLVER_DB_URL}"
          echo "=== generate_calibration_advice completed ==="

      - name: Emit calibration summary
        if: always()
        run: |
          DB_PATH="${RESOLVER_DB_URL#duckdb:///}"
          python - <<PY
          import duckdb, json, pathlib
          con = duckdb.connect("${DB_PATH}", read_only=True)
          tables = (
              "resolutions",
              "scores",
              "bucket_centroids",
              "bucket_definitions",
              "calibration_weights",
              "calibration_advice",
          )
          counts = {}
          for t in tables:
              try:
                  counts[t] = con.execute(f"SELECT COUNT(*) FROM {t}").fetchone()[0]
              except Exception as exc:
                  counts[t] = f"error: {exc}"
          summary = {"table_counts": counts}
          pathlib.Path("calibration_summary.json").write_text(json.dumps(summary, indent=2))
          print(json.dumps(summary, indent=2))
          PY

      - name: Upload calibration summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-summary
          path: calibration_summary.json

      - name: Upload canonical resolver DB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db
          path: data/resolver.duckdb

      # The implicit workflow_run chain (Resolver Update → Resolutions → Scores →
      # Calibration → Publish) is too deep: GitHub does not propagate the
      # workflow_run event from Calibration to "Publish Latest Data (Release)", so
      # the post-calibration terminus DB never reaches the release on its own.
      # Dispatch the publish explicitly, targeting THIS run's pythia-resolver-db
      # artifact (uploaded in the step above). workflow_dispatch is one of the
      # documented events that GITHUB_TOKEN is allowed to trigger, so no PAT needed.
      - name: Publish post-calibration DB to release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish_latest_data.yml \
            -R "${{ github.repository }}" \
            --ref main \
            -f run_id=${{ github.run_id }}
