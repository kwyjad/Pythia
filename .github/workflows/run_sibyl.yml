---
name: Sibyl Deep Research

# Sibling to the standard forecasting pipeline: runs once a Horizon Scanner
# Triage run (which writes the volatility/RC scores and questions Sibyl
# selects from) has completed. Forecasts the top-10 highest-volatility
# affected/fatalities questions via agentic open-web research (Opus + Brave)
# and writes the results beside the standard track in the canonical DB.

on:
  workflow_run:
    workflows: ["Horizon Scanner Triage"]
    types: [completed]

  workflow_dispatch:
    inputs:
      hs_run_id:
        description: "HS run to forecast (default: latest with active questions)"
        required: false
        default: ""
      run_hard_cap_usd:
        description: "Hard run budget cap in USD"
        required: false
        default: "40"
      db_run_id:
        description: "Force pythia-resolver-db from this workflow run id"
        required: false
        default: ""

concurrency:
  group: pythia-resolver-db
  cancel-in-progress: false

permissions:
  contents: read
  actions: write  # dispatches publish_latest_data.yml after the artifact upload

jobs:
  sibyl:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      RESOLVER_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      PYTHIA_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install -r python_library_requirements.txt
          pip install duckdb

      - name: Download canonical resolver DB
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          rm -rf data/pythia-resolver-db
          rm -f data/resolver.duckdb data/resolver.duckdb.wal

          # ── Helper: locate resolver.duckdb inside downloaded artifact ──
          locate_and_copy_db() {
            if [ -f data/pythia-resolver-db/resolver.duckdb ]; then
              SRC="data/pythia-resolver-db/resolver.duckdb"
            else
              SRC=$(find data -maxdepth 4 -type f -name "resolver.duckdb" | head -n 1 || true)
            fi
            if [ -z "${SRC}" ]; then
              return 1
            fi
            if [ "$SRC" != "data/resolver.duckdb" ]; then
              cp "$SRC" data/resolver.duckdb
            fi
            rm -f data/resolver.duckdb.wal
            return 0
          }

          # ── Path A0: explicit db_run_id from manual dispatch ──
          FORCE_RUN_ID="${{ github.event.inputs.db_run_id }}"
          if [ -n "$FORCE_RUN_ID" ]; then
            echo "Downloading pythia-resolver-db from forced run $FORCE_RUN_ID"
            if gh run download "$FORCE_RUN_ID" -n pythia-resolver-db --dir data && locate_and_copy_db; then
              ls -lh data/resolver.duckdb
              exit 0
            fi
            echo "ERROR: could not download pythia-resolver-db from run $FORCE_RUN_ID"
            exit 1
          fi

          # ── Path A: triggered by workflow_run — download from triggering run ──
          RUN_ID="${{ github.event.workflow_run.id }}"
          if [ -n "$RUN_ID" ]; then
            echo "Downloading pythia-resolver-db from triggering run $RUN_ID"
            if gh run download "$RUN_ID" -n pythia-resolver-db --dir data && locate_and_copy_db; then
              echo "Found resolver DB from triggering run $RUN_ID"
              ls -lh data/resolver.duckdb
              exit 0
            fi
            echo "WARNING: Could not download from triggering run $RUN_ID; falling back to canonical discovery."
            rm -rf data/pythia-resolver-db
          fi

          # ── Path B: manual dispatch or fallback — canonical discovery ──
          echo "Searching for most recent pythia-resolver-db artifact..."
          CANDIDATES_FILE=$(mktemp)

          gh run list \
            --workflow "Horizon Scanner Triage" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Horizon Scanner Triage"' >>"${CANDIDATES_FILE}" || true

          gh run list \
            --workflow "Sibyl Deep Research" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Sibyl Deep Research"' >>"${CANDIDATES_FILE}" || true

          gh run list \
            --workflow "Pythia — Compute Calibration Weights & Advice" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Compute Calibration"' >>"${CANDIDATES_FILE}" || true

          gh run list \
            --workflow "Pythia — Compute SPD Scores" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Compute SPD Scores"' >>"${CANDIDATES_FILE}" || true

          gh run list \
            --workflow "Ingest Structured Data" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Ingest Structured Data"' >>"${CANDIDATES_FILE}" || true

          gh run list \
            --workflow "Resolver Update" \
            --branch main --status success \
            --json databaseId,createdAt --limit 10 \
            | jq -r '.[] | "\(.createdAt),\(.databaseId),Resolver Update"' >>"${CANDIDATES_FILE}" || true

          if [ ! -s "${CANDIDATES_FILE}" ]; then
            echo "ERROR: No successful workflow runs found with pythia-resolver-db artifact."
            exit 1
          fi

          sort -r "${CANDIDATES_FILE}" > "${CANDIDATES_FILE}.sorted"

          FOUND=0
          while IFS=',' read -r CREATED CAND_RUN_ID LABEL; do
            echo "Trying ${LABEL} run ${CAND_RUN_ID} (${CREATED})..."
            rm -rf data/pythia-resolver-db
            rm -f data/resolver.duckdb data/resolver.duckdb.wal

            if gh run download "$CAND_RUN_ID" -n pythia-resolver-db --dir data && locate_and_copy_db; then
              echo "Found resolver DB from ${LABEL} run ${CAND_RUN_ID}"
              ls -lh data/resolver.duckdb
              FOUND=1
              break
            fi
          done < "${CANDIDATES_FILE}.sorted"

          if [ "${FOUND}" -ne 1 ]; then
            echo "ERROR: No valid pythia-resolver-db artifact found."
            exit 1
          fi

      - name: Gate on eligible questions with volatility scores
        id: gate
        run: |
          set -euo pipefail
          python - <<'EOF' | tee gate_out.txt
          import os
          os.environ.setdefault("PYTHIA_DB_URL", os.environ["RESOLVER_DB_URL"])
          from sibyl.select_questions import select_top_questions
          qs = select_top_questions(os.environ.get("SIBYL_HS_RUN_ID") or None)
          print(f"SIBYL_ELIGIBLE_COUNT={len(qs)}")
          EOF
          COUNT=$(grep -oE 'SIBYL_ELIGIBLE_COUNT=[0-9]+' gate_out.txt | tail -1 | cut -d= -f2)
          echo "eligible=${COUNT:-0}" >> "$GITHUB_OUTPUT"
          if [ "${COUNT:-0}" = "0" ]; then
            echo "No eligible questions with volatility scores — skipping Sibyl run."
          fi
        env:
          SIBYL_HS_RUN_ID: ${{ github.event.inputs.hs_run_id }}

      - name: Run Sibyl
        if: steps.gate.outputs.eligible != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          MODEL_COSTS_JSON: ${{ secrets.MODEL_COSTS_JSON }}
          SIBYL_RUN_HARD_CAP_USD: ${{ github.event.inputs.run_hard_cap_usd || '40' }}
          SIBYL_BUDGET_USD_PER_QUESTION: ${{ vars.SIBYL_BUDGET_USD_PER_QUESTION || '' }}
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.hs_run_id }}" ]; then
            python -m sibyl.run --hs-run-id "${{ github.event.inputs.hs_run_id }}" | tee sibyl_stdout.txt
          else
            python -m sibyl.run | tee sibyl_stdout.txt
          fi

      - name: Upload canonical resolver DB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db
          path: data/resolver.duckdb

      - name: Publish post-Sibyl DB to release
        if: success() && steps.gate.outputs.eligible != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish_latest_data.yml \
            -R "${{ github.repository }}" \
            --ref main \
            -f run_id=${{ github.run_id }}
