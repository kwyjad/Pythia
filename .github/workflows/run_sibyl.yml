---
name: Sibyl Deep Research

# Sibling to the standard forecasting pipeline: runs once a Horizon Scanner
# Triage run (which writes the volatility/RC scores and questions Sibyl
# selects from) has completed. Forecasts the top-10 highest-volatility
# affected/fatalities questions via agentic open-web research (Opus + Brave)
# and writes the results beside the standard track in the canonical DB.

on:
  workflow_run:
    workflows: ["Horizon Scanner Triage"]
    types: [completed]

  workflow_dispatch:
    inputs:
      hs_run_id:
        description: "HS run to forecast (default: latest with active questions)"
        required: false
        default: ""
      run_hard_cap_usd:
        description: "Hard run budget cap in USD"
        required: false
        default: "40"
      db_run_id:
        description: "Force pythia-resolver-db from this workflow run id"
        required: false
        default: ""

concurrency:
  group: pythia-resolver-db
  cancel-in-progress: false

permissions:
  contents: read
  actions: write  # dispatches publish_latest_data.yml after the artifact upload

jobs:
  sibyl:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      RESOLVER_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb
      PYTHIA_DB_URL: duckdb:///${{ github.workspace }}/data/resolver.duckdb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install -r python_library_requirements.txt
          pip install duckdb

      # Forced mode: operator-supplied db_run_id (fatal if unavailable).
      # Path A: triggering HS Triage run. Path B: canonical discovery.
      # Shared logic + candidate list live in .github/actions/download-canonical-db.
      - name: Download canonical resolver DB
        uses: ./.github/actions/download-canonical-db
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          force-run-id: ${{ github.event.inputs.db_run_id }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Gate on eligible questions with volatility scores
        id: gate
        run: |
          set -euo pipefail
          python - <<'EOF' | tee gate_out.txt
          import os
          os.environ.setdefault("PYTHIA_DB_URL", os.environ["RESOLVER_DB_URL"])
          from sibyl.select_questions import select_top_questions
          qs = select_top_questions(os.environ.get("SIBYL_HS_RUN_ID") or None)
          print(f"SIBYL_ELIGIBLE_COUNT={len(qs)}")
          EOF
          COUNT=$(grep -oE 'SIBYL_ELIGIBLE_COUNT=[0-9]+' gate_out.txt | tail -1 | cut -d= -f2)
          echo "eligible=${COUNT:-0}" >> "$GITHUB_OUTPUT"
          if [ "${COUNT:-0}" = "0" ]; then
            echo "No eligible questions with volatility scores — skipping Sibyl run."
          fi
        env:
          SIBYL_HS_RUN_ID: ${{ github.event.inputs.hs_run_id }}

      - name: Run Sibyl
        if: steps.gate.outputs.eligible != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          # MODEL_COSTS_JSON env override removed 2026-07: pythia/model_costs.json
          # (now per-1M-token rates) is authoritative and carries the
          # claude-opus-4-8 entry Sibyl's budget cap depends on.
          SIBYL_RUN_HARD_CAP_USD: ${{ github.event.inputs.run_hard_cap_usd || '40' }}
          SIBYL_BUDGET_USD_PER_QUESTION: ${{ vars.SIBYL_BUDGET_USD_PER_QUESTION || '' }}
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.hs_run_id }}" ]; then
            python -m sibyl.run --hs-run-id "${{ github.event.inputs.hs_run_id }}" | tee sibyl_stdout.txt
          else
            python -m sibyl.run | tee sibyl_stdout.txt
          fi

      - name: Upload canonical resolver DB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pythia-resolver-db
          path: data/resolver.duckdb

      - name: Publish post-Sibyl DB to release
        if: success() && steps.gate.outputs.eligible != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish_latest_data.yml \
            -R "${{ github.repository }}" \
            --ref main \
            -f run_id=${{ github.run_id }}
