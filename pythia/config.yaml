app:
  cron_enabled: false
  schedule: "0 6 1 * *"          # monthly, 06:00; ignored when cron_enabled=false
  frequency: "monthly"            # can later be "quarterly"
  db_url: "duckdb:///data/resolver.duckdb"

security:
  api_token_header: "X-Pythia-Token"
  api_tokens: ["CHANGE_THIS_TOKEN"]

hazards_allowed: ["FL","DR","TC","HW","ACE","DI","CU","EC","PHE"]   # MULTI/OT disabled; ACO retired in favour of ACE

hs:
  horizon_months: 6
  prompt_version: "1.0.0"

researcher:
  prompt_version: "1.0.0"
  web_search: true
  sources: ["news","metaculus","manifold"]
  web_research:
    enabled: true                  # mirror of PYTHIA_WEB_RESEARCH_ENABLED
    backend: "gemini"              # gemini|exa|perplexity|auto
    max_results: 10
    timeout_sec: 60
    recency_days: 120
    cache: true
    include_structural: true
    budget_usd_per_run: null       # hard cap; null = unlimited
    max_calls_per_question: null   # hard cap; null = unlimited

prediction_markets:
  enabled: true                     # Master switch; override with PYTHIA_PREDICTION_MARKETS_ENABLED=0 to disable
  platforms:
    metaculus:
      enabled: true
      api_url: "https://www.metaculus.com/api2/questions/"
      cache_ttl_hours: 24
      min_forecasters: 10
    polymarket:
      enabled: true
      api_url: "https://gamma-api.polymarket.com"
      min_volume_usd: 10000
      min_liquidity_usd: 5000
    manifold:
      enabled: true
      api_url: "https://api.manifold.markets/v0"
      min_unique_bettors: 10
      min_liquidity_mana: 500
  query_generation:
    model: "gemini-3.5-flash"  # Cheap/fast model for query generation
    max_queries: 5
  relevance_filter:
    model: "gemini-3.5-flash"
    min_relevance_score: 6
    max_results: 5
  timeout_sec: 30

llm:
  # ==========================================================================
  # MODEL REGISTRY — the single place to swap a model family.
  #
  # To upgrade a family (e.g. GPT-5.4 -> GPT-5.5):
  #   1. Change the id on ONE line below.
  #   2. Add a cost entry in pythia/model_costs.json (per-1M [input, output]).
  # Everything downstream (SPD ensemble, HS triage/RC, Track 2, scenario
  # writer, grounding fallbacks, CrisisWatch) references these aliases via
  # the ensemble and roles blocks — never a literal model id.
  # pythia/tests/test_model_registry.py enforces registry <-> cost-table sync.
  # ==========================================================================
  models:
    gpt:          openai:gpt-5.4                  # OpenAI frontier
    gpt_mini:     openai:gpt-5.4-mini             # OpenAI small
    claude:       anthropic:claude-opus-4-8       # Anthropic frontier (ensemble + Sibyl)
    gemini_pro:   google:gemini-3.1-pro-preview   # Google frontier
    gemini_flash: google:gemini-3.5-flash         # Google fast (thinking) — HS triage/RC, Track 2, scenarios
    gemini_lite:  google:gemini-2.5-flash         # Google cheap tier (grounding/scraping fallbacks)

  # Active profile: "prod" (frontier).
  # Override via PYTHIA_LLM_PROFILE env var.
  profile: "prod"

  profiles:
    prod:
      # SPD forecast ensemble — add/remove members by editing this list.
      # Each entry references a registry alias via `model:` (preferred) and may
      # carry per-model params. Legacy formats ("provider:model_id" strings or
      # {provider, model_id} dicts) still work.
      ensemble:
        # GPT: reasoning model — temperature not supported (API rejects it).
        # High effort reserved for the frontier member (main reasoning depth).
        - model: gpt
          thinking: high            # maps to reasoning_effort=high

        # Claude Opus: rejects sampling params (the provider adapter drops
        # temperature for the opus-4-7+/sonnet-5+/fable family). Uses the
        # API's default (adaptive) thinking — no thinking knob is wired for
        # Anthropic in providers.py.
        - model: claude

        # Gemini Pro: thinking model — medium thinking for analytical depth
        # without paying for the "high" tier on every SPD call.
        - model: gemini_pro
          temperature: 0.2
          thinking: medium           # maps to thinkingConfig.thinkingLevel

        # Gemini Flash: the fast/cheap member — low thinking keeps latency
        # and output-token cost down; depth comes from Pro/GPT/Opus.
        - model: gemini_flash
          temperature: 0.2
          thinking: low

        # GPT mini: smaller reasoning model — medium effort is the sweet spot
        # (low degrades SPD quality; high costs nearly as much as full GPT).
        - model: gpt_mini
          thinking: medium           # maps to reasoning_effort=medium

      # Role -> model assignments. Values are registry aliases (preferred) or
      # explicit "provider:model_id" refs. Env vars still win where noted.
      roles:
        # --- Horizon Scanner (all triage + RC passes on Gemini Flash) ---
        hs_default:       gemini_flash  # triage pass 1 + adversarial checks (HS_MODEL_ID env overrides)
        hs_triage_pass1:  gemini_flash  # PYTHIA_TRIAGE_MODEL_PASS1 overrides
        hs_triage_pass2:  gemini_flash  # PYTHIA_TRIAGE_MODEL_PASS2 overrides
        rc_pass1:         gemini_flash  # PYTHIA_RC_MODEL_PASS1 overrides
        rc_pass2:         gemini_flash  # PYTHIA_RC_MODEL_PASS2 overrides
        hs_fallback:      gpt           # JSON repair; PYTHIA_HS_FALLBACK_MODEL_SPECS overrides
        # --- Forecaster ---
        track2_spd:       gemini_flash  # Track 2 single-model SPD (stored as model_name=track2_flash)
        scenario_writer:  gemini_flash  # PYTHIA_SCENARIO_MODEL_ID overrides
        # --- Grounding / scraping fallbacks ---
        grounding_gemini: gemini_lite   # Gemini grounding backend (PYTHIA_GROUNDING_MODEL_ID overrides)
        grounding_openai: openai:gpt-4.1  # OpenAI web search backend (PYTHIA_WEB_RESEARCH_MODEL_ID overrides)
        grounding_openai_fallback: openai:gpt-4.1-mini  # retry model when the primary web-search call fails
        grounding_claude: anthropic:claude-haiku-4-5-20251001  # Claude web search backend — cheap tier; Opus is reserved for forecasts
        crisiswatch:      gemini_lite   # CrisisWatch Gemini grounding fallback

forecaster:
  horizons: [1,2,3,4,5,6]
  metrics: ["PIN","PA"]
  # Bucket definitions live in pythia/buckets.py (BUCKET_SPECS) — the old
  # class_bins / ranking.representative_values blocks here were dead config
  # with pre-2025 labels and no code consumers.
  aggregator: { strategy: "Bayes_MC", version: "1.0.0" }

api:
  host: "0.0.0.0"
  port: 8080
  base_path: "/v1"
