app:
  cron_enabled: false
  schedule: "0 6 1 * *"          # monthly, 06:00; ignored when cron_enabled=false
  frequency: "monthly"            # can later be "quarterly"
  db_url: "duckdb:///data/resolver.duckdb"

security:
  api_token_header: "X-Pythia-Token"
  api_tokens: ["CHANGE_THIS_TOKEN"]

hazards_allowed: ["FL","DR","TC","HW","ACE","DI","CU","EC","PHE"]   # MULTI/OT disabled; ACO retired in favour of ACE

hs:
  horizon_months: 6
  prompt_version: "1.0.0"

researcher:
  prompt_version: "1.0.0"
  web_search: true
  sources: ["news","metaculus","manifold"]
  web_research:
    enabled: true                  # mirror of PYTHIA_WEB_RESEARCH_ENABLED
    backend: "gemini"              # gemini|exa|perplexity|auto
    max_results: 10
    timeout_sec: 60
    recency_days: 120
    cache: true
    include_structural: true
    budget_usd_per_run: null       # hard cap; null = unlimited
    max_calls_per_question: null   # hard cap; null = unlimited

prediction_markets:
  enabled: true                     # Master switch; override with PYTHIA_PREDICTION_MARKETS_ENABLED=0 to disable
  platforms:
    metaculus:
      enabled: true
      api_url: "https://www.metaculus.com/api2/questions/"
      cache_ttl_hours: 24
      min_forecasters: 10
    polymarket:
      enabled: true
      api_url: "https://gamma-api.polymarket.com"
      min_volume_usd: 10000
      min_liquidity_usd: 5000
    manifold:
      enabled: true
      api_url: "https://api.manifold.markets/v0"
      min_unique_bettors: 10
      min_liquidity_mana: 500
  query_generation:
    model: "gemini-3-flash-preview"  # Cheap/fast model for query generation
    max_queries: 5
  relevance_filter:
    model: "gemini-3-flash-preview"
    min_relevance_score: 6
    max_results: 5
  timeout_sec: 30

llm:
  # Active profile: "test" (cheap) or "prod" (frontier).
  # Override via PYTHIA_LLM_PROFILE env var.
  profile: "prod"

  profiles:
    test:
      # Cheap models for development / CI
      ensemble:
        - google:gemini-3-flash-preview

    prod:
      # SPD forecast ensemble — add/remove models by editing this list.
      # String format ("provider:model_id") or dict format with per-model params.
      ensemble:
        # GPT-5.2: reasoning model — temperature not supported (API rejects it).
        - provider: openai
          model_id: gpt-5.2
          thinking: high            # maps to reasoning_effort=high

        # Claude Sonnet 4.6: standard model — low temperature for calibrated output.
        - anthropic:claude-sonnet-4-6

        # Gemini 3.1 Pro: thinking model — medium thinking for analytical depth.
        - provider: google
          model_id: gemini-3.1-pro-preview
          temperature: 0.2
          thinking: medium           # maps to thinkingConfig.thinkingLevel

        # Gemini 3 Flash: thinking model — low thinking for speed/cost balance.
        - provider: google
          model_id: gemini-3-flash-preview
          temperature: 0.2
          thinking: low

        # Kimi K2.5: reasoning model — Moonshot recommends temperature=1.0 for thinking mode.
        - provider: kimi
          model_id: kimi-k2.5
          temperature: 1.0

        # DeepSeek Reasoner: native reasoning model — temperature ignored by API.
        - provider: deepseek
          model_id: deepseek-reasoner
          temperature: 1.0

        # GPT-5-mini: reasoning model (smaller) — medium reasoning effort.
        - provider: openai
          model_id: gpt-5-mini
          thinking: medium           # maps to reasoning_effort=medium

      # Purpose-specific model overrides (optional, defaults to ensemble members)
      hs_fallback: openai:gpt-5.2
      scenario_writer: google:gemini-3-flash-preview

forecaster:
  horizons: [1,2,3,4,5,6]
  metrics: ["PIN","PA"]
  class_bins: ["<5k","5k-<25k","25k-<100k","100k-<500k",">=500k"]
  aggregator: { strategy: "Bayes_MC", version: "1.0.0" }

ranking:
  representative_values:
    "<5k": 2500
    "5k-<25k": 15000
    "25k-<100k": 62500
    "100k-<500k": 300000
    ">=500k": 700000
  population_source: "worldpop"

api:
  host: "0.0.0.0"
  port: 8080
  base_path: "/v1"
